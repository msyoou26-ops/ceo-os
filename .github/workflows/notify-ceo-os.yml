name: Notify CEO Room OS

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build payload
        run: |
          cat > payload.json << 'EOF'
          {
            "repository": {"name": "${{ github.event.repository.name }}"},
            "ref": "${{ github.ref }}",
            "pusher": {"name": "${{ github.actor }}"},
            "commits": ${{ toJson(github.event.commits) }}
          }
          EOF

      - name: Send push event to CEO Room OS
        env:
          RAW_TOKEN: ${{ secrets.CEO_OS_WEBHOOK_TOKEN }}
        run: |
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d '\n\r ')
          BASE_URL="https://script.google.com/macros/s/AKfycbzNaCJQm2wS4DLeDSFLxLGtCsX7O79MAdy0YDnvbE2tLl51Yyl1DTf-rXxK2JXhpCuJiA/exec"
          FULL_URL="${BASE_URL}?source=github&token=${TOKEN}"
          curl -v -X POST -L --post302 --post303 -H "Content-Type: application/json" --data @payload.json "${FULL_URL}"
