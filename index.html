<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>CEO室OS</title>

<!--
  ============================================================
  CEO室OS Ver.2 — Sprint 8
  ============================================================
  実装範囲:
  ・HOME / AI秘書 / Projects / Portfolio / SNS / Menu (Sprint1-7から継続、UI変更なし)
  ・【Sprint7】HOMEをGoogle Spreadsheet + GAS Web Appに実接続(API_URL/DEV_MODE=false)
  ・【Sprint8追加】API_ENABLED_SCREENSを新設し、画面ごとに段階的にAPI接続を有効化できる
    構造に変更。Sprint8時点では home と projects のみ true(AI/SNS/Menuはまだダミー)
  ・【Sprint8追加】Projects/Portfolio画面をSpreadsheet接続(projects/portfolio/
    portfolio_history/portfolio_releases/portfolio_fixesシートを使用)
  ※接続前にrender側/normalize側/Code.gs側のフィールド名を4点照合済み(不整合なし)。
  ※Spreadsheet側にportfolio関連4シートの追加作成が必要(翔側の作業)。
  設計方針: 開発仕様書 v1.0 第1〜12章に準拠
    - 1機能=1コンポーネント、カードは独立
    - Canva素材は差し替え可能(ASSETS)。無くても崩れないUI
    - Data Layerを経由(将来GAS API化を見据え、関数はPromiseで統一)
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
/* ============================================================
   1. DESIGN TOKENS (開発仕様書 第3章・第10章)
   ============================================================ */
:root{
  /* Color */
  --c-navy-900:#0A1B33;
  --c-navy-700:#14304F;
  --c-navy-500:#3A5C82;
  --c-orange-500:#FF6A2C;
  --c-orange-600:#E8571E;
  --c-orange-100:#FFEDE3;
  --c-green-500:#1FA463;
  --c-green-100:#E4F6EC;
  --c-red-500:#E5484D;
  --c-red-100:#FDE8E8;
  --c-bg:#FFFFFF;
  --c-surface:#F4F5F7;
  --c-border:#E8EAEF;
  --c-text-900:#10151F;
  --c-text-500:#6B7280;
  --c-text-300:#A7ACB6;

  /* Radius (第10章-5) */
  --r-card:16px;
  --r-btn:12px;
  --r-input:12px;
  --r-modal:20px;
  --r-chip:999px;

  /* Spacing (第10章-4) */
  --sp-screen:20px;
  --sp-card-gap:16px;
  --sp-card-pad:18px;
  --sp-title-gap:8px;
  --sp-btn-gap:12px;

  /* Shadow (第10章-6: 弱い影のみ) */
  --shadow-sm:0 1px 2px rgba(16,21,31,0.05), 0 1px 1px rgba(16,21,31,0.03);
  --shadow-md:0 6px 20px rgba(10,27,51,0.07);

  /* Motion (第10章-11: 150〜250ms) */
  --dur-fast:150ms;
  --dur-base:200ms;
  --dur-slow:260ms;
  --ease:cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--c-bg);
  color:var(--c-text-900);
  font-family:'Zen Kaku Gothic New', -apple-system, 'Hiragino Sans', sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
button{font-family:inherit;}
img{max-width:100%;display:block;}

/* prefers-reduced-motion対応 */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

.tabular-num{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1; }

/* ============================================================
   2. APP SHELL
   ============================================================ */
#app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
  position:relative;
}

/* ---- Header (第4章-3 / 第12章-3) ---- */
.co-header{
  padding:calc(env(safe-area-inset-top) + 18px) var(--sp-screen) 4px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.co-header__greeting-eyebrow{
  font-size:12px;
  color:var(--c-text-500);
  margin:0 0 4px;
  letter-spacing:.02em;
}
.co-header__greeting{
  font-size:20px;
  font-weight:700;
  margin:0 0 6px;
  line-height:1.3;
}
.co-header__streak{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:700;
  color:var(--c-orange-600);
  background:var(--c-orange-100);
  padding:4px 10px 4px 8px;
  border-radius:var(--r-chip);
}
.co-header__streak svg{width:13px;height:13px;}
.co-header__actions{
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.co-icon-btn{
  width:38px;height:38px;
  border-radius:11px;
  border:1px solid var(--c-border);
  background:var(--c-bg);
  display:flex;align-items:center;justify-content:center;
  color:var(--c-navy-900);
  cursor:pointer;
  transition:transform var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
  position:relative;
}
.co-icon-btn:active{transform:scale(0.92); background:var(--c-surface);}
.co-icon-btn svg{width:19px;height:19px;}
.co-icon-btn__dot{
  position:absolute; top:8px; right:8px;
  width:7px;height:7px;border-radius:50%;
  background:var(--c-orange-500);
  border:1.5px solid var(--c-bg);
}

/* ---- Section shell ---- */
.co-section{
  padding:10px var(--sp-screen) 0;
}
.co-section__head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:var(--sp-title-gap);
  padding:0 2px;
}
.co-section__title{
  font-size:14px;
  font-weight:700;
  color:var(--c-text-900);
  margin:0;
  display:flex;
  align-items:center;
  gap:6px;
}
.co-section__link{
  font-size:12px;
  color:var(--c-text-500);
  background:none;border:none;
  cursor:pointer;
  padding:4px;
}

/* ---- Generic Card (第10章-9 / 第12章-5) ---- */
.co-card{
  background:var(--c-bg);
  border:1px solid var(--c-border);
  border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);
  padding:var(--sp-card-pad);
  margin-bottom:var(--sp-card-gap);
  /* Canva背景差し替えポイント: background-image は JS(applyImageAsset)で付与 */
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(10px);
  animation:coCardEnter var(--dur-slow) var(--ease) forwards;
}
@keyframes coCardEnter{
  to{opacity:1; transform:translateY(0);}
}

/* ============================================================
   3. SKELETON LOADING (第10章-12: スピナー禁止, Skeleton基本)
   ============================================================ */
.co-skel-card{
  height:88px;
  border-radius:var(--r-card);
  background:var(--c-surface);
  margin-bottom:var(--sp-card-gap);
  position:relative;
  overflow:hidden;
}
.co-skel-card::after{
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  transform:translateX(-100%);
  animation:coShimmer 1.3s infinite;
}
@keyframes coShimmer{ to{ transform:translateX(100%); } }

/* ============================================================
   4. ミッションカード (第4章-4 / 第12章-17)
   ============================================================ */
.co-mission{
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 4px;
  border-bottom:1px solid var(--c-border);
}
.co-mission:last-child{border-bottom:none;}
.co-mission__check{
  width:26px;height:26px;
  border-radius:9px;
  border:1.6px solid var(--c-border);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  background:var(--c-bg);
  transition:all var(--dur-base) var(--ease);
}
.co-mission__check svg{
  width:15px;height:15px;
  opacity:0;
  transform:scale(0.5);
  transition:all var(--dur-base) var(--ease);
  color:#fff;
}
.co-mission.is-done .co-mission__check{
  background:var(--c-orange-500);
  border-color:var(--c-orange-500);
}
.co-mission.is-done .co-mission__check svg{ opacity:1; transform:scale(1); }
.co-mission__body{flex:1; min-width:0;}
.co-mission__title{
  font-size:14.5px; font-weight:700; margin:0;
  transition:color var(--dur-base) var(--ease);
}
.co-mission.is-done .co-mission__title{ color:var(--c-text-300); text-decoration:line-through; }
.co-mission__meta{ font-size:11.5px; color:var(--c-text-500); margin-top:2px; font-weight:700; }
.co-mission__meta[data-axis="開発"]{ color:var(--c-navy-700); }
.co-mission__meta[data-axis="発信"]{ color:var(--c-orange-600); }
.co-mission__meta[data-axis="収益化"]{ color:var(--c-green-500); }
.co-mission__priority{
  font-size:10.5px;
  font-weight:700;
  padding:3px 8px;
  border-radius:var(--r-chip);
  flex-shrink:0;
}
.co-mission__priority[data-level="high"]{ background:var(--c-red-100); color:var(--c-red-500); }
.co-mission__priority[data-level="normal"]{ background:var(--c-surface); color:var(--c-text-500); }

.co-xp-pop{
  position:fixed;
  font-size:13px; font-weight:700;
  color:var(--c-orange-600);
  pointer-events:none;
  z-index:80;
  animation:coXpPop 900ms var(--ease) forwards;
}
@keyframes coXpPop{
  0%{ opacity:0; transform:translateY(0) scale(0.8); }
  20%{ opacity:1; transform:translateY(-6px) scale(1); }
  100%{ opacity:0; transform:translateY(-34px) scale(1); }
}

/* ============================================================
   5. AIブリーフィング (第4章-5)
   ============================================================ */
.co-briefing{
  background:linear-gradient(135deg, var(--c-navy-900), var(--c-navy-700));
  color:#fff;
  border:none;
}
.co-briefing__label{
  display:flex; align-items:center; gap:6px;
  font-size:11.5px; font-weight:700;
  color:rgba(255,255,255,0.65);
  margin-bottom:10px;
}
.co-briefing__label svg{ width:13px;height:13px; color:var(--c-orange-500); }
.co-briefing__item{
  display:flex; gap:8px;
  font-size:13.5px;
  line-height:1.6;
  padding:6px 0;
  color:rgba(255,255,255,0.94);
}
.co-briefing__item + .co-briefing__item{ border-top:1px solid rgba(255,255,255,0.1); }
.co-briefing__dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--c-orange-500);
  margin-top:8px; flex-shrink:0;
}

/* ============================================================
   6. Quick Actions (第4章-12 / 第9章-6)
   ============================================================ */
.co-qa-row{
  display:flex; gap:10px;
  overflow-x:auto;
  padding:2px 20px 6px;
  margin:0 -20px;
  scrollbar-width:none;
}
.co-qa-row::-webkit-scrollbar{display:none;}
.co-qa{
  flex:0 0 auto;
  width:74px;
  display:flex; flex-direction:column; align-items:center; gap:7px;
  background:none; border:none; cursor:pointer;
  padding:2px 0;
}
.co-qa__icon{
  width:50px;height:50px;
  border-radius:15px;
  background:var(--c-surface);
  display:flex;align-items:center;justify-content:center;
  color:var(--c-navy-900);
  transition:transform var(--dur-fast) var(--ease);
}
.co-qa:active .co-qa__icon{ transform:scale(0.9); }
.co-qa__icon svg{ width:21px;height:21px; }
.co-qa__label{ font-size:11px; color:var(--c-text-500); font-weight:500; text-align:center; }

/* ============================================================
   7. KPI (第4章-7 / 第12章-18)
   ============================================================ */
.co-kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--sp-card-gap);
}
.co-kpi{ margin-bottom:0; cursor:pointer; }
.co-kpi__title{ font-size:12px; color:var(--c-text-500); margin:0 0 8px; font-weight:500; display:flex; align-items:center; gap:6px; }
.co-kpi__axis{
  font-size:9.5px; font-weight:700;
  padding:2px 6px; border-radius:var(--r-chip);
}
.co-kpi__axis[data-axis="開発"]{ background:rgba(20,48,79,0.08); color:var(--c-navy-700); }
.co-kpi__axis[data-axis="発信"]{ background:var(--c-orange-100); color:var(--c-orange-600); }
.co-kpi__axis[data-axis="収益化"]{ background:var(--c-green-100); color:var(--c-green-500); }
.co-kpi__value{ font-size:23px; font-weight:900; letter-spacing:-.01em; }
.co-kpi__unit{ font-size:12px; font-weight:700; color:var(--c-text-500); margin-left:1px; }
.co-kpi__delta{
  display:inline-flex; align-items:center; gap:3px;
  font-size:11px; font-weight:700; margin-top:6px;
}
.co-kpi__delta svg{ width:11px;height:11px; }
.co-kpi__delta[data-dir="up"]{ color:var(--c-green-500); }
.co-kpi__delta[data-dir="down"]{ color:var(--c-red-500); }
.co-kpi__delta[data-dir="flat"]{ color:var(--c-text-300); }

/* ============================================================
   8. Project / Progress (第4章-8)
   ============================================================ */
.co-project{ display:flex; flex-direction:column; gap:2px; padding:10px 2px; }
.co-project + .co-project{ border-top:1px solid var(--c-border); }
.co-project__top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.co-project__name{ font-size:14px; font-weight:700; display:flex; align-items:center; gap:7px;}
.co-project__dot{ width:7px;height:7px;border-radius:50%; flex-shrink:0; }
.co-project__pct{ font-size:12.5px; font-weight:700; color:var(--c-text-500); }
.co-progress{
  height:6px; border-radius:99px; background:var(--c-surface); overflow:hidden;
}
.co-progress__bar{
  height:100%; border-radius:99px;
  background:var(--c-orange-500);
  width:0%;
  transition:width 900ms var(--ease);
}
.co-project__meta{ font-size:11px; color:var(--c-text-500); margin-top:6px; }

/* ============================================================
   9. SNS状況 (第4章-9)
   ============================================================ */
.co-sns-row{ display:flex; gap:10px; }
.co-sns{
  flex:1;
  background:var(--c-surface);
  border-radius:12px;
  padding:12px 10px;
  text-align:center;
}
.co-sns__badge{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 8px;
  font-size:11px;font-weight:900;color:#fff;
}
.co-sns__value{ font-size:16px; font-weight:900; }
.co-sns__label{ font-size:10.5px; color:var(--c-text-500); margin-top:2px; }

/* ============================================================
   10. Recent Activity (第4章-11)
   ============================================================ */
.co-timeline__item{ display:flex; gap:12px; padding:9px 2px; }
.co-timeline__item + .co-timeline__item{ border-top:1px solid var(--c-border); }
.co-timeline__icon{
  width:30px;height:30px;border-radius:9px;
  background:var(--c-surface);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0; color:var(--c-navy-900);
}
.co-timeline__icon svg{ width:15px;height:15px; }
.co-timeline__title{ font-size:13.5px; font-weight:700; margin:0; }
.co-timeline__time{ font-size:11px; color:var(--c-text-500); margin-top:1px; }

/* ============================================================
   11. Empty State (第10章-13)
   ============================================================ */
.co-empty{
  text-align:center;
  padding:56px 24px 40px;
}
.co-empty__icon{
  width:52px;height:52px;border-radius:16px;
  background:var(--c-surface);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px; color:var(--c-text-300);
}
.co-empty__icon svg{ width:24px;height:24px; }
.co-empty__title{ font-size:15px; font-weight:700; margin:0 0 6px; }
.co-empty__desc{ font-size:13px; color:var(--c-text-500); margin:0 0 18px; line-height:1.6; }
.co-empty__btn{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--c-navy-900); color:#fff;
  border:none; border-radius:var(--r-btn);
  padding:11px 18px; font-size:13px; font-weight:700;
  cursor:pointer;
}

/* ============================================================
   11b. Modal (第10章-15 / 第12章-10)
   ============================================================ */
.co-modal-backdrop{
  position:fixed; inset:0; z-index:120;
  background:rgba(10,16,26,0.42);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity var(--dur-base) var(--ease);
}
.co-modal-backdrop.is-open{ opacity:1; pointer-events:auto; }
.co-modal-sheet{
  width:100%; max-width:520px; max-height:86vh;
  overflow-y:auto;
  background:var(--c-bg);
  border-radius:var(--r-modal) var(--r-modal) 0 0;
  padding:14px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);
  transition:transform var(--dur-slow) var(--ease);
}
.co-modal-backdrop.is-open .co-modal-sheet{ transform:translateY(0); }
.co-modal-handle{ width:36px;height:4px;border-radius:99px;background:var(--c-border); margin:0 auto 16px; }
.co-modal-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
.co-modal-title{ font-size:17px; font-weight:900; margin:0; line-height:1.3; }
.co-modal-subtitle{ font-size:12px; color:var(--c-text-500); margin:4px 0 0; }
.co-modal-close{
  width:32px;height:32px;border-radius:10px;border:none;
  background:var(--c-surface); color:var(--c-text-500);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0; cursor:pointer;
}
.co-modal-close svg{ width:16px;height:16px; }
.co-modal-section{ margin-bottom:16px; }
.co-modal-section__label{ font-size:11.5px; font-weight:700; color:var(--c-text-500); margin:0 0 8px; }
.co-modal-section p{ font-size:13.5px; line-height:1.7; margin:0; }
.co-modal-chip-row{ display:flex; flex-wrap:wrap; gap:6px; }
.co-modal-chip{ font-size:11.5px; font-weight:700; background:var(--c-surface); color:var(--c-navy-900); padding:5px 10px; border-radius:var(--r-chip); }
.co-modal-link-row{ display:flex; align-items:center; gap:8px; background:var(--c-surface); border-radius:11px; padding:10px 12px; margin-bottom:8px; }
.co-modal-link-row svg{ width:16px;height:16px; color:var(--c-text-500); flex-shrink:0; }
.co-modal-link-row span{ flex:1; font-size:12.5px; color:var(--c-text-900); word-break:break-all; }
.co-modal-copy-btn{ border:none; background:var(--c-bg); border-radius:8px; padding:5px 9px; font-size:11px; font-weight:700; color:var(--c-navy-700); cursor:pointer; flex-shrink:0; }
.co-modal-list-item{ display:flex; gap:10px; padding:7px 0; font-size:13px; }
.co-modal-list-item + .co-modal-list-item{ border-top:1px solid var(--c-border); }
.co-modal-list-item__date{ color:var(--c-text-300); font-size:11.5px; flex-shrink:0; width:38px; }
.co-modal-shot{
  width:100%; aspect-ratio:16/9; border-radius:12px;
  background:linear-gradient(135deg, var(--c-surface), #eef0f3);
  display:flex; align-items:center; justify-content:center;
  color:var(--c-text-300);
  background-size:cover; background-position:center;
}
.co-modal-shot svg{ width:26px;height:26px; }
.co-modal-empty-note{ font-size:12.5px; color:var(--c-text-300); }

/* ============================================================
   11c. Projects / Portfolio
   ============================================================ */
.co-devcard{ cursor:pointer; }
.co-devcard__meta-row{ display:flex; align-items:center; justify-content:space-between; font-size:11.5px; color:var(--c-text-500); margin-top:8px; }
.co-devcard__meta-row svg{ width:14px;height:14px; color:var(--c-text-300); }

.co-portfolio-card{ display:flex; flex-direction:column; gap:10px; cursor:pointer; }
.co-portfolio-card__top{ display:flex; align-items:center; gap:12px; }
.co-portfolio-card__badge{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:#fff; font-size:12px; font-weight:900; flex-shrink:0;
}
.co-portfolio-card__name{ font-size:14.5px; font-weight:800; margin:0; }
.co-portfolio-card__tag{ font-size:10.5px; font-weight:700; color:var(--c-green-500); background:var(--c-green-100); padding:2px 8px; border-radius:var(--r-chip); margin-top:3px; display:inline-block; }
.co-portfolio-card__chevron{ margin-left:auto; color:var(--c-text-300); flex-shrink:0; }

<script>
"use strict";

/* ============================================================
   0. ASSETS CONFIG — Canva素材の差し替えポイント
   ------------------------------------------------------------
   ここにCanvaで書き出したURL(またはbase64/相対パス)を入れるだけで
   ロゴ・背景・カード装飾に反映される。空(null)なら自動でCSSの
   フォールバック(グラデーション/アイコン)が使われるため、
   素材が無い状態でもUIは崩れない。
   ============================================================ */
const ASSETS = {
  logo: null,              // 例: "assets/images/logo.png"
  homeHeroBackground: null,// 例: "assets/images/hero-bg.jpg" (AIブリーフィングカード背景に合成)
  missionCardDecoration: null,
  achievementBadge: {      // 実績バッジ(将来のレベルシステムで使用予定)
    bronze: null,
    silver: null,
    gold: null
  }
};

/**
 * 画像アセットを要素へ安全に適用する。
 * 読み込みに失敗/未設定の場合はfallbackClassのCSSに任せて崩れないようにする。
 */
function applyImageAsset(el, url, fallbackClass) {
  if (!url) {
    if (fallbackClass) el.classList.add(fallbackClass);
    return;
  }
  const probe = new Image();
  probe.onload = () => { el.style.backgroundImage = `url("${url}")`; };
  probe.onerror = () => { if (fallbackClass) el.classList.add(fallbackClass); };
  probe.src = url;
}

/* ============================================================
   0b. 【Sprint3】API接続設定 — Google Spreadsheet / GAS連携の土台
   ------------------------------------------------------------
   目的: 「ダミーデータ卒業」に向けて、DataLayerの各関数を
   “API_URLが設定されていればAPIから取得、nullならダミーデータ”
   という切替方式に統一する。

   使い方:
   ・今は API_URL = null のまま運用する(Sprint3では接続しない)。
   ・将来GASをWebアプリとして公開したら、そのURLをここに入れるだけで、
     DataLayer配下の各関数が自動的にAPI経路に切り替わる。
   ・呼び出し側(renderHomeScreen, renderProjectsScreen 等)は
     一切変更不要 ── DataLayerの中身だけを差し替える設計。

   API側(GAS)に期待する仕様(Sprint4以降で実装予定):
   ・GET  {API_URL}?action=getHomeData      → HOME用データ一式を返す
   ・GET  {API_URL}?action=getProjectsData  → Projects/Portfolio一式
   ・GET  {API_URL}?action=getAiData        → AI秘書一式
   ・GET  {API_URL}?action=getSnsData       → SNS一式
   ・GET  {API_URL}?action=getMenuData      → Menu一式
   ・POST {API_URL}  body:{action:"setMissionDone", ...}   → ミッション更新
   ・POST {API_URL}  body:{action:"addAiRequest", ...}     → AI依頼追加
   返却JSONの形は、現在の各ダミーデータ(DUMMY_SEED / PROJECTS_SEED /
   AI_SEED / SNS_SEED / MENU_SEED)と同じキー構成にすること。
   これにより画面側のrender関数を一切変更せずに接続できる。

   ------------------------------------------------------------
   【Spreadsheet設計書(Sprint3時点の設計案)】
   実際にシートを作るのはSprint4以降。ここでは列構成を先に固める。

   ■ missions(HOMEの今日のミッション)
     id / title / axis(開発・発信・収益化) / priority(high/normal) /
     xp / done(true/false) / date(YYYY-MM-DD, 日次リセット用)

   ■ kpi(HOMEのKPIカード)
     key / title / axis / value / unit / deltaPct / dir(up/down/flat) / icon

   ■ briefing(AIブリーフィングの文言)
     id / text / sortOrder / date

   ■ projects(開発中プロジェクト)
     id / name / progress / color / sprint / next / updatedAt / ai

   ■ portfolio(実績)
     id / name / tag / initial / color / summary / stack(カンマ区切り) /
     github / netlify / result / screenshot
     ※ history/releases/fixesは1実績に対して複数行になるため、
        以下の子シートに分離する(正規化):
     - portfolio_history:  portfolio_id / date / text
     - portfolio_releases: portfolio_id / date / text
     - portfolio_fixes:    portfolio_id / date / text

   ■ ai_agents(AI秘書のロールカード)
     id / name / role / status / lastUsed / color

   ■ ai_templates(クイック依頼のテンプレート)
     id / label / sortOrder

   ■ ai_requests(依頼履歴・今日の依頼)
     id / ai / text / status / date / isToday(true/false)

   ■ sns_platforms(SNS基本情報)
     key / label / color / stockCount / nextPost / scheduled

   ■ sns_followers(フォロワー推移・時系列)
     platform_key / date / count

   ■ sns_posts(投稿履歴)
     platform_key / date / title

   ■ activity(最近の成果)
     id / title / time / icon

   ■ menu_profile(プロフィール)
     name / role / streakDays

   ■ menu_items(Menu一覧の項目)
     key / label / icon / sortOrder

   ■ settings(汎用設定 / 通知設定・テーマなど将来用のKey-Value)
     key / value
   ============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycby-Ce9QNDrsrUMeytViBzyJDaY-nGNrLHTtL7XQR5kR2rTmbcSR_-LQ4RDwSdCPOsv3zA/exec";

/**
 * 【Sprint5】開発モード切替。
 * DEV_MODE=true の間は、API_URLが設定されていても常にダミーデータを使う。
 * 「本番はAPI接続、でも手元の動作確認はいつでもダミーに戻せる」を両立するための
 * 独立したスイッチ。API_URLとDEV_MODEは互いに干渉しない(片方だけ変えればよい)。
 *
 *   DEV_MODE=true  → 常にダミーデータ(API_URLの値は無視)
 *   DEV_MODE=false かつ API_URL設定あり → APIを使用
 *   DEV_MODE=false かつ API_URL=null    → ダミーデータ(今はこの状態)
 */
const DEV_MODE = false;

/**
 * 【Sprint8】画面ごとにAPI接続を段階的に有効化するためのフラグ。
 * DEV_MODE/API_URLの大枠の条件は維持しつつ、「どの画面から実データに
 * 切り替えるか」を1つずつコントロールする。Sprint8時点では home と
 * projects のみ true(AI/SNS/Menuはまだダミーのまま = 誤って広がらない)。
 */
const API_ENABLED_SCREENS = {
  home: true,
  projects: true,
  ai: false,
  sns: false,
  menu: false
};

/** API経由でデータ取得すべきかどうかを判定する(DataLayer各メソッドが画面名を渡して呼ぶ) */
function shouldUseApi(screen) {
  return !DEV_MODE && !!API_URL && !!API_ENABLED_SCREENS[screen];
}

/**
 * 【Sprint6】Logger — console.log直書きを廃止し、ログ出力を一元管理する。
 * DEV_MODE=trueの時だけ出力し、本番(DEV_MODE=false)では自動的に沈黙する設計。
 * INFO/WARN/ERRORの3段階のみ(第6章の「ログ設計」に沿ったシンプルな実装)。
 */
const Logger = {
  info(...args) { if (DEV_MODE) console.log("[INFO]", ...args); },
  warn(...args) { if (DEV_MODE) console.warn("[WARN]", ...args); },
  error(...args) { if (DEV_MODE) console.error("[ERROR]", ...args); }
};

/**
 * 【Sprint6.1】将来の認証を見据えた余白。
 * 今は未使用(null)だが、Bearerトークンやセッションキーなどを
 * ここに設定するだけでapiRequest()が自動的にヘッダへ載せる構造にしておく。
 * 認証方式が決まっても、変更はこのファイルのAPI設定周りだけで完結する想定。
 */
const AUTH_TOKEN = null; // 例: "Bearer xxxxxxxx"

/** 認証ヘッダを組み立てる。AUTH_TOKEN未設定なら空オブジェクト(=今までと同じ挙動)。 */
function buildAuthHeaders() {
  return AUTH_TOKEN ? { Authorization: AUTH_TOKEN } : {};
}

/**
 * 【Sprint6.1】APIバージョン管理。
 * クライアントが対応できるレスポンス形式のバージョンをここで宣言する。
 * サーバー側(Code.gs)のversionと食い違っていても、いきなり止めるのではなく
 * WARNログを出すだけで動作は継続する(将来の互換性確保のための緩い検証)。
 */
const SUPPORTED_VERSION = "1.0";

/**
 * GAS Web App への共通リクエストヘルパー。
 * API_URLが未設定の間は呼ばれない(DataLayer側でガードする)ため、
 * ここではAPI_URL設定後にそのまま動く形で用意しておく。
 *
 * 【Sprint6】以下を追加:
 * ・タイムアウト(8秒): 通信がハングしても画面が固まらないようAbortControllerで打ち切る
 * ・レスポンス形式の検証: { version, data } 形式を期待し、versionが無ければ警告ログ
 * ・エラー形式の統一: { error: "..." } が返ってきたら例外として投げる(呼び出し元でフォールバック)
 * 【Sprint6.1】以下を追加:
 * ・認証ヘッダ(buildAuthHeaders)を全リクエストに付与できる余白を追加
 * ・SUPPORTED_VERSIONとの不一致をWARNのみで継続動作するように変更
 */
const API_TIMEOUT_MS = 8000;

async function apiRequest(action, params = {}, method = "GET") {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
  try {
    let res;
    if (method === "GET") {
      const url = new URL(API_URL);
      url.searchParams.set("action", action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      res = await fetch(url.toString(), { signal: controller.signal, headers: buildAuthHeaders() });
    } else {
      // 【Sprint7 PMレビュー反映】Content-Type: application/json だとGAS Web App相手に
      // preflight(OPTIONS)が発生し失敗しやすいため、text/plainで送りJSON文字列だけを
      // 本文に入れる(Code.gs側のparsePostBody()がこれをJSON.parseで受け取る)。
      // Authorizationヘッダのみ、AUTH_TOKEN設定時に付与する。
      res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain", ...buildAuthHeaders() },
        body: JSON.stringify({ action, ...params }),
        signal: controller.signal
      });
    }
    if (!res.ok) throw new Error(`API error (${action}): ${res.status}`);

    const json = await res.json();
    if (!json || typeof json !== "object") throw new Error(`API error (${action}): 不正なレスポンス形式`);
    if (json.error) throw new Error(`API error (${action}): ${json.error}`);
    if (!json.version) {
      Logger.warn(`apiRequest(${action}): レスポンスにversionがありません`, json);
    } else if (json.version !== SUPPORTED_VERSION) {
      // 【Sprint6.1】バージョン不一致は致命的エラーにせず、WARNのみで動作を継続する
      Logger.warn(`apiRequest(${action}): APIバージョン不一致 (supported=${SUPPORTED_VERSION}, received=${json.version})`);
    }

    // 【Sprint6】{ version, data } 形式ならdataを取り出す。旧形式(dataキー無し)にも後方互換で対応。
    return json.data !== undefined ? json.data : json;
  } catch (err) {
    if (err.name === "AbortError") {
      throw new Error(`API error (${action}): タイムアウト(${API_TIMEOUT_MS}ms)`);
    }
    throw err;
  } finally {

/* ============================================================
   2c. 【Sprint6/6.1】正規化レイヤー(Validation / Normalization)
   ------------------------------------------------------------
   目的: Spreadsheet側の列順変更・空セル・型崩れ(数値が文字列で
   返ってくる等)がUI側の描画関数に影響しないよう、DataLayerが
   値を返す直前に必ずこの正規化を通す。API経由でもダミーデータ
   経由でも同じ正規化を通すため、常に同じ形のオブジェクトが
   render系関数に渡ることを保証する。

   【Sprint6.1】各normalize*関数の重複を減らすため、
   normalizeString/Number/Boolean/Array/Enum という共通ユーティリティを
   新設し、個別のnormalize関数はこれらの組み合わせだけで書く方針にした。
   ============================================================ */
function normalizeString(v, fallback = "") {
  return v === undefined || v === null ? fallback : String(v);
}
function normalizeNumber(v, fallback = 0) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}
function normalizeBoolean(v, fallback = false) {
  if (typeof v === "boolean") return v;
  if (v === undefined || v === null || v === "") return fallback;
  return String(v).toLowerCase() === "true";
}
function normalizeArray(v, itemNormalizer) {
  if (!Array.isArray(v)) return [];
  return itemNormalizer ? v.map(itemNormalizer) : v;
}
function normalizeEnum(v, allowed, fallback) {
  return allowed.includes(v) ? v : fallback;
}
function normalizeNumberArray(v, fallback = []) {
  return Array.isArray(v) ? v.map(Number).filter(Number.isFinite) : fallback;
}

const AXIS_VALUES = ["開発", "発信", "収益化"];
const KPI_DIR_VALUES = ["up", "down", "flat"];

function normalizeMission(m) {
  m = m || {};
  return {
    id: normalizeString(m.id),
    title: normalizeString(m.title, "無題のミッション"),
    axis: normalizeEnum(m.axis, AXIS_VALUES, "発信"),
    priority: m.priority === "high" ? "high" : "normal",
    xp: normalizeNumber(m.xp),
    done: normalizeBoolean(m.done)
  };
}
function normalizeKpiItem(k) {
  k = k || {};
  return {
    key: normalizeString(k.key),
    title: normalizeString(k.title),
    axis: normalizeEnum(k.axis, AXIS_VALUES, "発信"),
    value: normalizeNumber(k.value),
    unit: normalizeString(k.unit),
    deltaPct: normalizeNumber(k.deltaPct),
    dir: normalizeEnum(k.dir, KPI_DIR_VALUES, "flat"),
    icon: k.icon || "chart",
    history: Array.isArray(k.history) ? normalizeNumberArray(k.history) : undefined
  };
}
function normalizeDevProject(p) {
  p = p || {};
  return {
    id: normalizeString(p.id),
    name: normalizeString(p.name),
    progress: Math.min(100, Math.max(0, normalizeNumber(p.progress))),
    color: p.color || "#FF6A2C",
    sprint: normalizeString(p.sprint),
    next: normalizeString(p.next),
    updatedAt: normalizeString(p.updatedAt),
    ai: normalizeString(p.ai)
  };
}
function normalizeActivityItem(a) {
  a = a || {};
  return { id: normalizeString(a.id), title: normalizeString(a.title), time: normalizeString(a.time), icon: a.icon || "sparkle" };
}
function normalizeHomeSnsItem(s) {
  s = s || {};
  return { key: normalizeString(s.key), label: normalizeString(s.label), color: s.color || "#0A1B33", value: normalizeString(s.value), sub: normalizeString(s.sub) };
}
/** HOME用データの正規化。API/ダミーいずれの経路でも最終的にこれを通す。 */
function normalizeHomeData(raw) {
  raw = raw || {};
  return {
    streakDays: normalizeNumber(raw.streakDays),
    missions: normalizeArray(raw.missions, normalizeMission),
    briefing: normalizeArray(raw.briefing, (v) => normalizeString(v)),
    kpi: normalizeArray(raw.kpi, normalizeKpiItem),
    projects: normalizeArray(raw.projects, normalizeDevProject),
    sns: normalizeArray(raw.sns, normalizeHomeSnsItem),
    activity: normalizeArray(raw.activity, normalizeActivityItem),
    yesterdaySummary: raw.yesterdaySummary && typeof raw.yesterdaySummary === "object" ? raw.yesterdaySummary : null
  };
}

function normalizeDateTextPair(x) {
  return { date: normalizeString(x && x.date), text: normalizeString(x && x.text) };
}
function normalizePortfolioItem(p) {
  p = p || {};
  return {
    id: normalizeString(p.id),
    name: normalizeString(p.name),
    tag: normalizeString(p.tag),
    initial: normalizeString(p.initial) || (p.name ? String(p.name).slice(0, 2) : ""),
    color: p.color || "#14304F",
    summary: normalizeString(p.summary),
    stack: Array.isArray(p.stack) ? p.stack.map(String) : normalizeString(p.stack).split(",").map(s => s.trim()).filter(Boolean),
    github: p.github || null,
    netlify: p.netlify || null,
    history: normalizeArray(p.history, normalizeDateTextPair),
    releases: normalizeArray(p.releases, normalizeDateTextPair),
    fixes: normalizeArray(p.fixes, normalizeDateTextPair),
    result: normalizeString(p.result),
    screenshot: p.screenshot || null
  };
}
/** Projects/Portfolioデータの正規化。 */
function normalizeProjectsData(raw) {
  raw = raw || {};
  return {
    dev: normalizeArray(raw.dev, normalizeDevProject),
    portfolio: normalizeArray(raw.portfolio, normalizePortfolioItem)
  };
}

function normalizeAgent(a) {
  a = a || {};
  return { id: normalizeString(a.id), name: normalizeString(a.name), role: normalizeString(a.role), status: a.status || "待機中", lastUsed: normalizeString(a.lastUsed), color: a.color || "#1FA463" };
}
function normalizeRequestItem(r) {
  r = r || {};
  return {
    id: normalizeString(r.id),
    ai: r.ai === "Claude" ? "Claude" : "ChatGPT",
    text: normalizeString(r.text),
    status: r.status || "待機中",
    date: normalizeString(r.date)
  };
}
/** AI秘書データの正規化。 */
function normalizeAiData(raw) {
  raw = raw || {};
  return {
    agents: normalizeArray(raw.agents, normalizeAgent),
    templates: normalizeArray(raw.templates, (v) => normalizeString(v)),
    todayRequests: normalizeArray(raw.todayRequests, normalizeRequestItem),
    history: normalizeArray(raw.history, normalizeRequestItem)
  };
}

function normalizePost(post) {
  return { date: normalizeString(post && post.date), title: normalizeString(post && post.title) };
}
function normalizePlatform(p) {
  p = p || {};
  return {
    key: normalizeString(p.key),
    label: normalizeString(p.label),
    color: p.color || "#0A1B33",
    followers: normalizeNumberArray(p.followers, [0, 0]),
    stockCount: normalizeNumber(p.stockCount),
    nextPost: normalizeString(p.nextPost),
    scheduled: normalizeString(p.scheduled),
    lastPosts: normalizeArray(p.lastPosts, normalizePost)
  };
}
/** SNSデータの正規化。 */
function normalizeSnsData(raw) {
  raw = raw || {};
  return { platforms: normalizeArray(raw.platforms, normalizePlatform) };
}

function normalizeMenuItem(item) {
  item = item || {};
  return { key: normalizeString(item.key), label: normalizeString(item.label), icon: item.icon || "settings" };
}
function normalizeRevenueEntry(e) {
  return {
    date: normalizeString(e && e.date),
    platform: normalizeString(e && e.platform),
    amount: normalizeNumber(e && e.amount),
    category: normalizeString(e && e.category),
    confirmed: normalizeBoolean(e && e.confirmed)
  };
}
/** Menuデータの正規化(KPI一覧・収益管理を含む)。 */
function normalizeMenuData(raw) {
  raw = raw || {};
  const profile = raw.profile || {};
  const revenue = raw.revenue || {};
  return {
    profile: {
      name: normalizeString(profile.name),
      role: normalizeString(profile.role),
      streakDays: normalizeNumber(profile.streakDays)
    },
    items: normalizeArray(raw.items, normalizeMenuItem),
    kpi: normalizeArray(raw.kpi, normalizeKpiItem),
    revenue: {
      monthLabel: normalizeString(revenue.monthLabel),
      total: normalizeNumber(revenue.total),
      entries: normalizeArray(revenue.entries, normalizeRevenueEntry)
    }
  };
}

const DataLayer = {
  /**
   * 【Sprint3/5】HOME用データ取得。
   * shouldUseApi()がtrueならGAS経由でSpreadsheet(missions/kpi/briefing/
   * projects/sns/activityシート)から取得し、そうでなければダミーデータを返す。
   * ローカル永続化されたミッション完了状態のみ復元し、それ以外はダミーとして返す
   */
  async getHomeData() {
    if (shouldUseApi("home")) {
      // 【GAS接続ポイント】action=getHomeData → missions/kpi/briefing/projects/sns/activity 各シートを結合して返す想定
      try {
        return normalizeHomeData(await apiRequest("getHomeData"));
      } catch (e) {
        Logger.error("[DataLayer] getHomeData: API取得失敗。ダミーデータにフォールバックします。", e);
        // 【Sprint5 エラー耐性】画面を止めずToastで知らせてダミーデータへフォールバック
        showToast("データ取得に失敗しました。オフラインデータを表示します");
      }
    }
    // ---- ここから既存のダミーデータ処理(Sprint1〜2から継続 / Sprint4で日次リセットを追加) ----
    return new Promise((resolve) => {
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (e) { saved = {}; }

      /*
       * 【Sprint4】ミッション日次リセット。
       * 「毎日開きたくなるOS」の核なので、開いた瞬間に日付が変わっていたら
       * 自動でミッションの完了状態をリセットする(深夜バッチ不要・開いた時に判定する方式)。
       * リセット前の達成数は yesterdaySummary として1日だけ保持し、
       * 「昨日の成果が見える」体験に使う(renderHomeScreen側でToast表示)。
       */
      const today = todayISO();
      let yesterdaySummary = saved.yesterdaySummary || null;
      if (saved.lastResetDate && saved.lastResetDate !== today) {
        const prevMissionState = saved.missionState || {};
        const doneCount = Object.values(prevMissionState).filter(Boolean).length;
        yesterdaySummary = { date: saved.lastResetDate, doneCount, total: DUMMY_SEED.missions.length };
        saved.missionState = {};
        saved.yesterdaySummary = yesterdaySummary;
      }
      saved.lastResetDate = today;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));

      const missions = DUMMY_SEED.missions.map(m => ({
        ...m,
        done: saved.missionState ? !!saved.missionState[m.id] : m.done
      }));
      // 演出上の疑似レイテンシ(Skeletonが一瞬で消えないように/実運用ではAPI待ち時間になる)
      setTimeout(() => {
        resolve({ ...DUMMY_SEED, missions, yesterdaySummary });
      }, 450);
    }).then(normalizeHomeData);
  },

  /**
   * 【Sprint3/5】ミッション完了状態の更新。
   * shouldUseApi()がtrueなら missions シートの該当行(id一致)の done列を更新する想定。
   */
  async setMissionDone(missionId, done) {
    if (shouldUseApi("home")) {
      // 【GAS接続ポイント】action=setMissionDone → missionsシートのid一致行のdone列を更新
      try {
        return await apiRequest("setMissionDone", { missionId, done }, "POST");
      } catch (e) {
        Logger.error("[DataLayer] setMissionDone: API更新失敗。ローカル保存にフォールバックします。", e);
        showToast("保存に失敗しました。この端末に一時保存します");
      }
    }
    // ---- ここから既存のダミーデータ処理(Sprint1〜2から変更なし) ----
    return new Promise((resolve) => {
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (e) { saved = {}; }
      saved.missionState = saved.missionState || {};
      saved.missionState[missionId] = done;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      resolve(true);
    });
  },

  /**
   * 【Sprint3/5】Projects(開発中) / Portfolio(実績)取得。
   * shouldUseApi()がtrueなら projects / portfolio / portfolio_history / portfolio_releases /
   * portfolio_fixes の各シートを結合して返す想定(portfolio_idで紐付け)。
   */
  async getProjectsData() {
    if (shouldUseApi("projects")) {
      // 【GAS接続ポイント】action=getProjectsData → projects + portfolio(+子シート3つ)を結合
      try {
        return normalizeProjectsData(await apiRequest("getProjectsData"));
      } catch (e) {
        Logger.error("[DataLayer] getProjectsData: API取得失敗。ダミーデータにフォールバックします。", e);
        showToast("データ取得に失敗しました。オフラインデータを表示します");
      }
    }
    // ---- ここから既存のダミーデータ処理(Sprint2から変更なし) ----
    return new Promise((resolve) => setTimeout(() => resolve(PROJECTS_SEED), 400)).then(normalizeProjectsData);
  },

  /**
   * 【Sprint3/5】AI秘書(ChatGPT/Claude)データ取得。
   * shouldUseApi()がtrueなら ai_agents / ai_templates / ai_requests シートを結合して返す想定。
   */
  async getAiData() {
    if (shouldUseApi("ai")) {
      // 【GAS接続ポイント】action=getAiData → ai_agents + ai_templates + ai_requests(本日分/履歴分)を結合
      try {
        return normalizeAiData(await apiRequest("getAiData"));
      } catch (e) {
        Logger.error("[DataLayer] getAiData: API取得失敗。ダミーデータにフォールバックします。", e);
        showToast("データ取得に失敗しました。オフラインデータを表示します");
      }
    }
    // ---- ここから既存のダミーデータ処理(Sprint2から継続 / Sprint4で今日・履歴の自動振り分けを追加) ----
    return new Promise((resolve) => {
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(AI_STORAGE_KEY) || "{}"); } catch (e) { saved = {}; }

      /*
       * 【Sprint4】Sprint2形式(todayRequestsのみ・日付なし)からの移行措置。
       * 既存の保存データがあれば、今日の日付を付けて新形式(requests配列+date)へ変換する。
       */
      if (!saved.requests && saved.todayRequests) {
        saved.requests = saved.todayRequests.map(r => ({ ...r, date: todayISO(), displayDate: toMD() }));
        delete saved.todayRequests;
        localStorage.setItem(AI_STORAGE_KEY, JSON.stringify(saved));
      }

      /*
       * 「今日の依頼」は当日分のみ、日付が変わったものは自動で「履歴」へ回す。
       * (第5章の要件: 今日の依頼=当日限定 / 履歴=日付順)
       */
      const requests = saved.requests || [];
      const today = todayISO();
      const localToday = requests.filter(r => r.date === today);
      const localHistory = requests
        .filter(r => r.date !== today)
        .map(r => ({ ...r, date: r.displayDate || r.date }))
        .sort((a, b) => (a.date < b.date ? 1 : -1));

      setTimeout(() => resolve({
        ...AI_SEED,
        todayRequests: [...localToday, ...AI_SEED.todayRequests],
        history: [...localHistory, ...AI_SEED.history]
      }), 400);
    }).then(normalizeAiData);
  },

  /**
   * 【Sprint3/5】AI秘書: クイック依頼を今日の依頼リストへ追加。
   * shouldUseApi()がtrueなら ai_requests シートへ1行追加する想定(isToday=true, date=今日)。
   */
  async addAiRequest(request) {
    if (shouldUseApi("ai")) {
      // 【GAS接続ポイント】action=addAiRequest → ai_requestsシートへ1行追加
      try {
        return await apiRequest("addAiRequest", request, "POST");
      } catch (e) {
        Logger.error("[DataLayer] addAiRequest: API追加失敗。ローカル保存にフォールバックします。", e);
        showToast("送信に失敗しました。この端末に一時保存します");
      }
    }
    // ---- ここから既存のダミーデータ処理(Sprint2から継続 / Sprint4でdate付与を追加) ----
    return new Promise((resolve) => {
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(AI_STORAGE_KEY) || "{}"); } catch (e) { saved = {}; }
      saved.requests = saved.requests || [];
      // 【Sprint4】date(比較用ISO) / displayDate(履歴表示用 "M/D") を付与し、翌日は自動で履歴側に回るようにする
      saved.requests.unshift({ ...request, date: todayISO(), displayDate: toMD() });
      localStorage.setItem(AI_STORAGE_KEY, JSON.stringify(saved));
      resolve(true);
    });
  },

  /**
   * 【Sprint3/5】SNS(TikTok/X/note)データ取得。
   * shouldUseApi()がtrueなら sns_platforms / sns_followers / sns_posts シートを結合して返す想定。
   */
  async getSnsData() {
    if (shouldUseApi("sns")) {
      // 【GAS接続ポイント】action=getSnsData → sns_platforms + sns_followers(時系列) + sns_posts を結合
      try {
        return normalizeSnsData(await apiRequest("getSnsData"));
      } catch (e) {
        Logger.error("[DataLayer] getSnsData: API取得失敗。ダミーデータにフォールバックします。", e);
        showToast("データ取得に失敗しました。オフラインデータを表示します");
      }
    }
    // ---- ここから既存のダミーデータ処理(Sprint2から変更なし) ----
    return new Promise((resolve) => setTimeout(() => resolve(SNS_SEED), 400)).then(normalizeSnsData);
  },

  /**
   * 【Sprint3/5】Menuデータ取得。
   * shouldUseApi()がtrueなら menu_profile / menu_items / settings シートを結合して返す想定。
   */
  async getMenuData() {
    if (shouldUseApi("menu")) {
      // 【GAS接続ポイント】action=getMenuData → menu_profile + menu_items(+ settings)を結合
      try {
        return normalizeMenuData(await apiRequest("getMenuData"));
      } catch (e) {
        Logger.error("[DataLayer] getMenuData: API取得失敗。ダミーデータにフォールバックします。", e);
        showToast("データ取得に失敗しました。オフラインデータを表示します");
      }
    }
    // ---- ここから既存のダミーデータ処理(Sprint2から変更なし) ----
    return new Promise((resolve) => setTimeout(() => resolve(MENU_SEED), 250)).then(normalizeMenuData);
  }
};

/* ============================================================
   2d. 【Sprint6】Repository層
   ------------------------------------------------------------
   目的: UI(render系関数)がDataLayerを直接呼ばず、必ずこの層を
   経由するようにする。データ取得の責務はRepositoryだけが持ち、
   将来的にはここへキャッシュ・複数データソースの合成・
   リトライ制御などの責務を追加していく想定。

   責務分離のゴール:
     UI → Repository → DataLayer → API/GAS → Spreadsheet

   【Sprint6.1】キャッシュ戦略の切替口を追加。
   CacheStrategiesの中から使うものを1つ選ぶだけで、
   Repositoryの呼び出し側(UI)や下位のDataLayerには一切手を入れずに
   キャッシュの有無・方式を変更できる構造にしてある。
   ============================================================ */
const CacheStrategies = {
  /** 何もキャッシュしない(現在のデフォルト。常に最新を取りに行く=今までと同じ挙動) */
  none: {
    get: () => null,
    set: () => {},
    clear: () => {}
  },
  /** メモリ上だけの一時キャッシュ(タブを閉じたら消える。将来有効化する場合の候補①) */
  memory: (() => {
    const store = new Map();
    return {
      get: (key) => (store.has(key) ? store.get(key) : null),
      set: (key, value) => store.set(key, value),
      clear: (key) => (key ? store.delete(key) : store.clear())
    };
  })()
  // 【将来追加候補】
  // localStorage: ブラウザを閉じても残す「Offline Cache」。オフライン時の表示継続に使える。
  // gasCacheService: GAS側のCacheServiceと連携し、Spreadsheetへのアクセス回数を減らす。
  //   (この場合はDataLayer/Code.gs側の対応も必要になる)
};

/** 今使うキャッシュ戦略。切り替えたい場合はこの1行だけ変更すればよい。 */
const CACHE_STRATEGY = CacheStrategies.none;

/** キャッシュを確認し、無ければfetcher()を実行して結果をキャッシュする共通処理 */
async function withCache(key, fetcher) {
  const cached = CACHE_STRATEGY.get(key);
  if (cached !== null && cached !== undefined) {
    Logger.info(`[Repository] cache hit: ${key}`);
    return cached;
  }
  const fresh = await fetcher();
  CACHE_STRATEGY.set(key, fresh);
  return fresh;
}

const Repository = {
  getHomeData: () => withCache("home", () => DataLayer.getHomeData()),
  setMissionDone: async (missionId, done) => {
    const result = await DataLayer.setMissionDone(missionId, done);
    CACHE_STRATEGY.clear("home"); // 更新系操作はキャッシュを無効化しておく(有効化した時のための保険)
    return result;
  },
  getProjectsData: () => withCache("projects", () => DataLayer.getProjectsData()),
  getAiData: () => withCache("ai", () => DataLayer.getAiData()),
  addAiRequest: async (request) => {
    const result = await DataLayer.addAiRequest(request);
    CACHE_STRATEGY.clear("ai");
    return result;
  },
  getSnsData: () => withCache("sns", () => DataLayer.getSnsData()),
  getMenuData: () => withCache("menu", () => DataLayer.getMenuData())
};

function timeGreeting() {
  const h = new Date().getHours();
  if (h < 11) return "おはよう";
  if (h < 18) return "こんにちは";
  return "おつかれさま";
}

function formatDate(d) {
  const w = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
  return `${d.getMonth() + 1}月${d.getDate()}日(${w})`;
}

/**
 * 【Sprint4】日次リセット・AI依頼の「今日/履歴」振り分けに使う日付ユーティリティ。
 * todayISO(): "2026-07-05" のような比較用キー
 * toMD(d): "7/5" のような表示用文字列(既存の履歴表示フォーマットに合わせる)
 */
function todayISO(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function toMD(d = new Date()) {
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function formatNumber(n) {
  return n.toLocaleString("ja-JP");
}

/** 数値カウントアップアニメーション(第10章-11: Count Up採用) */
function animateCountUp(el, to, opts = {}) {
  const duration = opts.duration || 700;
  const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (prefersReduced) { el.textContent = formatNumber(to); return; }
  const start = performance.now();
  function tick(now) {
    const p = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = formatNumber(Math.round(to * eased));
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/** Toast表示(第10章-14: 保存/更新/削除等の短時間フィードバック, 約2秒) */
function showToast(message) {
  const wrap = document.getElementById("toast-wrap");
  const el = document.createElement("div");
  el.className = "co-toast";
  el.innerHTML = `<span>${message}</span>`;
  wrap.innerHTML = "";
  wrap.appendChild(el);
  setTimeout(() => {
    el.classList.add("is-leaving");
    setTimeout(() => el.remove(), 220);
  }, 1900);
}

/** ミッション完了時の "+XP" 演出をチェックボックス付近に表示 */
function popXp(anchorEl, xp) {
  const rect = anchorEl.getBoundingClientRect();
  const el = document.createElement("div");
  el.className = "co-xp-pop";
  el.textContent = `+${xp} XP`;
  el.style.left = `${rect.left + rect.width / 2 - 16}px`;
  el.style.top = `${rect.top - 6}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

/** Modal(第10章-15: 確認/編集/詳細/追加/削除は画面遷移の代わりにModalで表現) */
function openModal(innerHtml) {
  const backdrop = document.getElementById("modal-backdrop");
  const sheet = backdrop.querySelector(".co-modal-sheet");
  sheet.innerHTML = `<div class="co-modal-handle"></div>${innerHtml}`;
  backdrop.classList.add("is-open");
  document.body.style.overflow = "hidden";
  const closeBtn = sheet.querySelector('[data-action="modal-close"]');
  if (closeBtn) closeBtn.addEventListener("click", closeModal);
}
function closeModal() {
  const backdrop = document.getElementById("modal-backdrop");
  backdrop.classList.remove("is-open");
  document.body.style.overflow = "";
}

/** クリップボードコピー(GitHub/NetlifyのURLなどをワンタップコピー) */
async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast("コピーしました");
  } catch (e) {
    showToast("コピーに失敗しました");
  }
}

/**
 * 折れ線スパークライン(軽量・依存ライブラリ無し)。
 * SNS画面のフォロワー推移など、細かい数値説明を読ませずに傾向を伝える用途。
 */
function buildSparkline(values, color) {
  const w = 100, h = 30, pad = 3;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const points = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="30" preserveAspectRatio="none">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

      <span class="co-agent__avatar" style="background:${a.color}">${a.name.slice(0, 2)}</span>
      <p class="co-agent__name">${a.name}</p>
      <p class="co-agent__role">${a.role}</p>
      <span class="co-status-badge" data-status="${a.status}">${a.status}</span>
    </div>`;
}

function renderRequestItem(r, showDate) {
  const aiColor = r.ai === "Claude" ? "#FF6A2C" : "#1FA463";
  return `
    <div class="co-request-item">
      <span class="co-request-item__ai" style="background:${aiColor}">${r.ai.slice(0, 2)}</span>
      <span class="co-request-item__text">${r.text}</span>
      ${showDate ? `<span class="co-request-item__date">${r.date}</span>` : `<span class="co-status-badge" data-status="${r.status}">${r.status}</span>`}
    </div>`;
}

function bindAiEvents(container, data) {
  const templateRow = container.querySelector(".co-template-row");
  const textarea = container.querySelector("#ai-composer-input");
  if (templateRow && textarea) {
    templateRow.querySelectorAll(".co-template-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        textarea.value = textarea.value ? `${textarea.value} / ${chip.textContent}` : `${chip.textContent}：`;
        textarea.focus();
      });
    });
  }
  const sendBtn = container.querySelector("#ai-send-btn");
  if (sendBtn && textarea) {
    sendBtn.addEventListener("click", async () => {
      const text = textarea.value.trim();
      if (!text) { showToast("依頼内容を入力してください"); return; }
      const request = { id: `local-${Date.now()}`, ai: "Claude", text, status: "待機中" };
      await Repository.addAiRequest(request);
      const listEl = container.querySelector('[data-component="ai-today"] .co-card');
      if (listEl) listEl.insertAdjacentHTML("afterbegin", renderRequestItem(request, false));
      textarea.value = "";
      showToast("依頼を送信しました(Sprint3でAI連携予定)");
    });
  }
  const micBtn = container.querySelector("#ai-mic-btn");
  if (micBtn) micBtn.addEventListener("click", () => showToast("音声メモはSprint3以降で対応予定です"));
}

async function renderAiScreen() {
  const target = document.getElementById("screen-ai");
  target.innerHTML = renderSkeletonBlock([150, 130, 150, 130]);
  const data = await Repository.getAiData();
  const templateChips = data.templates.map(t => `<button class="co-template-chip">${t}</button>`).join("");

  // 【Sprint5 UI改善】依頼履歴は増え続けると縦に伸びるため、直近5件のみ初期表示し「もっと見る」で展開する
  const HISTORY_VISIBLE_COUNT = 5;
  const historyVisible = data.history.slice(0, HISTORY_VISIBLE_COUNT);
  const historyHidden = data.history.slice(HISTORY_VISIBLE_COUNT);
  const historyMoreBtn = historyHidden.length
    ? `<button class="co-section__link" id="ai-history-more" style="width:100%; text-align:center; padding:10px 0 2px;">もっと見る(${historyHidden.length}件)</button>`
    : "";

  target.innerHTML = `
    ${renderScreenTitle("AI秘書")}
    <section class="co-section" data-component="ai-agents">
      <div class="co-agent-grid">${data.agents.map(renderAgentCard).join("")}</div>
    </section>
    <section class="co-section" data-component="ai-composer">
      <div class="co-section__head"><p class="co-section__title">クイック依頼</p></div>
      <div class="co-card co-composer">
        <div class="co-template-row">${templateChips}</div>
        <textarea id="ai-composer-input" placeholder="やってほしいことを入力(例: TikTok企画を3案ください)"></textarea>
        <div class="co-composer__row">
          <button class="co-btn-primary" id="ai-send-btn">${icon("send")}依頼する</button>
          <button class="co-btn-ghost" id="ai-mic-btn" aria-label="音声メモ">${icon("mic")}</button>
        </div>
      </div>
    </section>
    <section class="co-section" data-component="ai-today">
      <div class="co-section__head"><p class="co-section__title">今日の依頼</p></div>
      <div class="co-card">${data.todayRequests.map(r => renderRequestItem(r, false)).join("")}</div>
    </section>
    <section class="co-section" data-component="ai-history" style="margin-bottom:8px;">
      <div class="co-section__head"><p class="co-section__title">依頼履歴</p></div>
      <div class="co-card" id="ai-history-list">${historyVisible.map(r => renderRequestItem(r, true)).join("")}</div>
      ${historyMoreBtn}
    </section>`;

  animateEntrance(target);
  bindAiEvents(target, data);

  // 【Sprint5 UI改善】もっと見る→残りを追加表示してボタンを消す
  const moreBtn = target.querySelector("#ai-history-more");
  if (moreBtn) {
    moreBtn.addEventListener("click", () => {
      const listEl = target.querySelector("#ai-history-list");
      listEl.insertAdjacentHTML("beforeend", historyHidden.map(r => renderRequestItem(r, true)).join(""));
      moreBtn.remove();
    });
  }
}

/* ============================================================
   4d. SNS コンポーネント
   ============================================================ */
function renderPlatformCard(p) {
  const current = p.followers[p.followers.length - 1];
  const prev = p.followers[p.followers.length - 2];
  const delta = current - prev;
  const lastPostsHtml = p.lastPosts.map(post => `
    <div class="co-modal-list-item"><span class="co-modal-list-item__date">${post.date}</span><span>${post.title}</span></div>
  `).join("");

  return `
    <div class="co-card co-platform-card" data-platform="${p.key}">
      <div class="co-platform-card__top">
        <span class="co-platform-card__badge" style="background:${p.color}">${p.label.slice(0, 2)}</span>
        <div>
          <p class="co-platform-card__label">${p.label}</p>
          <span class="co-platform-card__followers">${formatNumber(current)}人 (${delta >= 0 ? "+" : ""}${delta})</span>
        </div>
        <span class="co-platform-card__spark">${buildSparkline(p.followers, p.color)}</span>
      </div>
      <div class="co-platform-card__stats">
        <div class="co-platform-card__stat"><b>${p.stockCount}</b><span>ストック</span></div>
      </div>
      <div class="co-platform-card__next"><b>次の投稿:</b> ${p.nextPost}(${p.scheduled})</div>
      <div style="margin-top:10px;">${lastPostsHtml}</div>
    </div>`;
}

function buildPlatformDetailModal(p) {
  const lastPostsHtml = p.lastPosts.map(post => `
    <div class="co-modal-list-item"><span class="co-modal-list-item__date">${post.date}</span><span>${post.title}</span></div>

  return `
    <div class="co-modal-head">
      <div><p class="co-modal-title">${p.label}</p><p class="co-modal-subtitle">フォロワー推移(直近7)</p></div>
      <button class="co-modal-close" data-action="modal-close">${icon("close")}</button>
    </div>
    <div class="co-modal-section">${buildSparkline(p.followers, p.color)}</div>
    <div class="co-modal-section">
      <p class="co-modal-section__label">次に投稿する内容</p>
      <p>${p.nextPost}(予定: ${p.scheduled})</p>
    </div>
    <div class="co-modal-section">
      <p class="co-modal-section__label">投稿履歴</p>

}

function bindSnsEvents(container, data) {
  container.querySelectorAll("[data-platform]").forEach(el => {
    el.addEventListener("click", () => {

/* ============================================================

function buildProfileModal(profile) {

    <div class="co-modal-head">
      <div><p class="co-modal-title">プロフィール</p></div>
      <button class="co-modal-close" data-action="modal-close">${icon("close")}</button>

/**
 * 【Sprint4】KPI一覧Modal(CEOダッシュボード)。
 * HOMEと同じ3軸(開発/発信/収益化)ごとにグルーピングし、週次推移を
 * スパークラインで見せる。既存のbuildSparkline()をそのまま再利用。
 */
function buildKpiListModal(kpiList) {
  const axisOrder = ["開発", "発信", "収益化"];
  const axisColor = { "開発": "#14304F", "発信": "#FF6A2C", "収益化": "#1FA463" };
  const groups = axisOrder.map(axis => {
    const items = kpiList.filter(k => k.axis === axis);
    if (!items.length) return "";
    const rows = items.map(k => `
      <div class="co-modal-list-item" style="align-items:center;">
        <span style="flex:1;">
          <b style="display:block; font-size:14px; font-weight:800;">${k.title}</b>
          <span class="tabular-num" style="font-size:18px; font-weight:900;">${formatNumber(k.value)}</span>
          <span style="font-size:11px; color:var(--c-text-500);">${k.unit} ・ ${k.dir === "up" ? "+" : k.dir === "down" ? "-" : ""}${k.deltaPct}%</span>
        </span>
        <span style="width:90px;">${buildSparkline(k.history, axisColor[axis])}</span>
      </div>`).join("");
    return `
      <div class="co-modal-section">
        <p class="co-modal-section__label" style="color:${axisColor[axis]};">${axis}</p>
        ${rows}
      </div>`;
  }).join("");

  return `
    <div class="co-modal-head">
      <div><p class="co-modal-title">KPI一覧</p><p class="co-modal-subtitle">開発・発信・収益化(直近7日)</p></div>
      <button class="co-modal-close" data-action="modal-close">${icon("close")}</button>
    </div>
    ${groups}`;
}

/**
 * 【Sprint4】収益管理Modal。
 * 開発仕様書 第7章 Revenue(日付/媒体/金額/カテゴリ/確定)に準拠した一覧表示。
 */
function buildRevenueModal(revenue) {
  const rows = revenue.entries.map(e => `
    <div class="co-modal-list-item">
      <span class="co-modal-list-item__date">${e.date}</span>
      <span style="flex:1;">${e.platform} ・ ${e.category}</span>
      <span style="font-weight:800;">¥${formatNumber(e.amount)}</span>
      <span class="co-status-badge" data-status="${e.confirmed ? "完了" : "待機中"}">${e.confirmed ? "確定" : "未確定"}</span>
    </div>`).join("");

  return `
    <div class="co-modal-head">
      <div><p class="co-modal-title">収益管理</p><p class="co-modal-subtitle">${revenue.monthLabel}</p></div>
      <button class="co-modal-close" data-action="modal-close">${icon("close")}</button>
    </div>
    <div class="co-modal-section">
      <p class="co-modal-section__label">今月の合計</p>
      <span class="tabular-num" id="revenue-total" style="font-size:26px; font-weight:900;">0</span><span style="font-size:14px; font-weight:700;">円</span>
    </div>
    <div class="co-modal-section">
      <p class="co-modal-section__label">内訳</p>
      ${rows}
    </div>
    <p class="co-modal-empty-note">収益の追加入力はSprint5以降で対応予定です。</p>`;
}

function bindMenuEvents(container, data) {
  container.querySelectorAll("[data-menu-key]").forEach(row => {
    row.addEventListener("click", () => {
      const key = row.dataset.menuKey;
      // 【Sprint4】KPI一覧・収益管理はModalで詳細を見せる。他はまだ準備中。
      if (key === "kpi") {
        openModal(buildKpiListModal(data.kpi));
        return;
      }
      if (key === "revenue") {
        openModal(buildRevenueModal(data.revenue));
        const totalEl = document.getElementById("revenue-total");
        if (totalEl) animateCountUp(totalEl, data.revenue.total);
        return;
      }
      showToast("この項目はSprint5以降で実装予定です");
    });
  });
  const profileEl = container.querySelector("[data-menu-profile]");
  if (profileEl) profileEl.addEventListener("click", () => openModal(buildProfileModal(data.profile)));
}

async function renderMenuScreen() {
  const target = document.getElementById("screen-menu");
  target.innerHTML = renderSkeletonBlock([90, 240]);
  const data = await Repository.getMenuData();

  target.innerHTML = `
    ${renderScreenTitle("Menu")}
    <section class="co-section" data-component="menu-profile">
      <div class="co-card co-menu-profile" data-menu-profile>
        <span class="co-menu-avatar">${data.profile.name.slice(0, 1)}</span>
        <div>
          <p class="co-menu-profile__name">${data.profile.name}</p>
          <p class="co-menu-profile__role">${data.profile.role}</p>
        </div>
        <span class="co-portfolio-card__chevron" style="margin-left:auto;">${icon("chevronRight")}</span>
      </div>
    </section>
    <section class="co-section" data-component="menu-list" style="margin-bottom:8px;">
      <div class="co-card">${data.items.map(renderMenuRow).join("")}</div>
    </section>`;

  animateEntrance(target);

/* ============================================================
   5. HOME SCREEN 組み立て
   ============================================================ */
function buildHomeSkeleton() {
  const el = document.getElementById("home-skeleton");
  el.innerHTML = `
    ${renderHeader({ streakDays: 0 }).replace(/継続 0日/, "")}
    <div class="co-section">
      <div class="co-skel-card" style="height:150px;"></div>
      <div class="co-skel-card" style="height:110px;"></div>
      <div class="co-skel-card" style="height:70px;"></div>
      <div class="co-skel-card" style="height:150px;"></div>
    </div>`;
}

function bindMissionEvents(container, state) {
  container.querySelectorAll(".co-mission").forEach(row => {
    const checkEl = row.querySelector('[data-role="check"]');
    checkEl.addEventListener("click", async () => {
      const id = row.dataset.missionId;
      const xp = Number(row.dataset.xp);
      const willBeDone = !row.classList.contains("is-done");
      row.classList.toggle("is-done", willBeDone);
      if (willBeDone) popXp(checkEl, xp);
      await Repository.setMissionDone(id, willBeDone);
      const doneCount = container.querySelectorAll(".co-mission.is-done").length;
      const total = container.querySelectorAll(".co-mission").length;
      const linkEl = container.closest("section").querySelector(".co-section__link");
      if (linkEl) linkEl.textContent = `${doneCount}/${total} 完了`;
      if (willBeDone) showToast(`「${row.dataset.axis || ""}」が1件積み上がった。おつかれさま！`);
    });
  });
}

function bindQuickActionEvents(container) {
  container.querySelectorAll(".co-qa").forEach(btn => {
    btn.addEventListener("click", () => {
      showToast("この機能はSprint2以降で実装予定です");
    });
  });
}

function bindKpiEvents(container) {
  container.querySelectorAll(".co-kpi").forEach(card => {
    card.addEventListener("click", () => showToast("詳細画面は準備中です"));
  });
}

function bindHeaderEvents(container) {
  const notifyBtn = container.querySelector("#btn-notify");
  const settingsBtn = container.querySelector("#btn-settings");
  if (notifyBtn) notifyBtn.addEventListener("click", () => showToast("通知センターは準備中です"));
  if (settingsBtn) settingsBtn.addEventListener("click", () => showToast("設定画面は準備中です"));
}

function animateEntrance(container) {
  const cards = container.querySelectorAll(".co-card, .co-section");
  cards.forEach((el, i) => {
    el.style.animationDelay = `${Math.min(i * 45, 250)}ms`;
  });
}

async function renderHomeScreen() {
  buildHomeSkeleton();
  const skeletonEl = document.getElementById("home-skeleton");
  const contentEl = document.getElementById("home-content");

  const data = await Repository.getHomeData();

  contentEl.innerHTML = [
    renderHeader(data),
    renderMissionCard(data.missions),
    renderBriefingCard(data.briefing),
    renderQuickActions(),
    renderKpiCard(data.kpi),
    renderProjectCard(data.projects),
    renderSnsCard(data.sns),
    renderActivityCard(data.activity)
  ].join("");

  // Canva背景の差し替えポイント(未設定なら現状のグラデーションのまま)
  const briefingBg = document.getElementById("briefing-bg");
  if (briefingBg) applyImageAsset(briefingBg, ASSETS.homeHeroBackground, null);

  skeletonEl.style.display = "none";
  contentEl.style.display = "block";

  animateEntrance(contentEl);
  bindHeaderEvents(contentEl);
  bindMissionEvents(contentEl.querySelector('[data-component="mission-card"]'), data);
  bindQuickActionEvents(contentEl.querySelector('[data-component="quick-actions"]'));
  bindKpiEvents(contentEl.querySelector('[data-component="kpi-card"]'));

  // KPIカウントアップ & プロジェクト進捗バー
  contentEl.querySelectorAll("[data-count-to]").forEach(el => {
    animateCountUp(el, Number(el.dataset.countTo));
  });
  requestAnimationFrame(() => {
    contentEl.querySelectorAll("[data-progress-to]").forEach(el => {
      el.style.width = `${el.dataset.progressTo}%`;
    });
  });

  /*
   * 【Sprint4】「昨日の成果が見える」体験。
   * 日付が変わった直後の初回表示でのみ、前日の達成状況をToastで知らせる。
   * sessionStorageで「今日はもう見せた」を管理し、同じ日に何度もHOMEへ
   * 戻ってきてもToastが繰り返し出ないようにする(第10章のToast乱用禁止に配慮)。
   */
  if (data.yesterdaySummary) {
    const shownKey = "ceoOS_v2_yesterday_summary_shown";
    const today = todayISO();
    if (sessionStorage.getItem(shownKey) !== today) {
      const { doneCount, total } = data.yesterdaySummary;
      // 【Sprint5 UI改善】画面全体が見えてから成果を伝えたいので0.5秒遅らせて表示
      setTimeout(() => showToast(`昨日は${doneCount}/${total}ミッション達成でした`), 500);
      sessionStorage.setItem(shownKey, today);
    }
  }
}

/* ============================================================
   6. BOTTOM NAVIGATION / 画面切り替え
   ============================================================ */
const NAV_ITEMS = [
  { key: "home",     label: "HOME",     icon: "home" },
  { key: "ai",       label: "AI",       icon: "ai" },
  { key: "projects", label: "Projects", icon: "projects" },
  { key: "sns",      label: "SNS",      icon: "sns" },
  { key: "menu",     label: "Menu",     icon: "menu" }
];

/*
 * 【Portfolio方針メモ】Projectsタブは「今動かしている開発」と「実績」を分けて扱う。
 *   ・開発中: CEO室OS / その他AI開発
 *   ・実績(Portfolio): AWK管理システム(完成・運用中) / TikTok運営 / note運営 / X運営
 * AWKは「会社の管理対象」ではなく「翔個人の実績・SNS発信の素材」として扱う。
 * (Sprint2でPortfolio詳細モーダルとして実装済み: 概要/使用技術/GitHub/Netlify/
 *  開発履歴/リリース履歴/修正履歴/成果/スクリーンショット)
 */
const SCREEN_RENDERERS = {
  ai: renderAiScreen,
  projects: renderProjectsScreen,
  sns: renderSnsScreen,
  menu: renderMenuScreen
};

function renderBottomNav() {
  const nav = document.getElementById("bottom-nav");
  nav.innerHTML = NAV_ITEMS.map(item => `
    <button class="co-navitem ${item.key === "home" ? "is-active" : ""}" data-nav="${item.key}">
      ${icon(item.icon)}
      <span>${item.label}</span>
    </button>`).join("");

  nav.querySelectorAll(".co-navitem").forEach(btn => {
    btn.addEventListener("click", () => switchScreen(btn.dataset.nav));
  });
}

function switchScreen(key) {
  document.querySelectorAll(".co-navitem").forEach(b => b.classList.toggle("is-active", b.dataset.nav === key));
  document.querySelectorAll(".co-screen").forEach(s => s.classList.toggle("is-active", s.dataset.screen === key));

  if (key !== "home") {
    const target = document.getElementById(`screen-${key}`);
    if (!target.dataset.rendered) {
      target.dataset.rendered = "1";
      SCREEN_RENDERERS[key]();
    }
  }
  window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
}

/* ============================================================
   7. INIT
   ============================================================ */
document.addEventListener("DOMContentLoaded", () => {
  renderBottomNav();
  renderHomeScreen();

  const modalBackdrop = document.getElementById("modal-backdrop");
  modalBackdrop.addEventListener("click", (e) => {
    if (e.target === modalBackdrop) closeModal();
  });
});
</script>
