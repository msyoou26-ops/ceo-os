<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>CEO室OS</title>

<!--
  ============================================================
  CEO室OS Ver.2 — Sprint 8
  ============================================================
  実装範囲:
  ・HOME / AI秘書 / Projects / Portfolio / SNS / Menu (Sprint1-7から継続、UI変更なし)
  ・【Sprint7】HOMEをGoogle Spreadsheet + GAS Web Appに実接続(API_URL/DEV_MODE=false)
  ・【Sprint8追加】API_ENABLED_SCREENSを新設し、画面ごとに段階的にAPI接続を有効化できる
    構造に変更。Sprint8時点では home と projects のみ true(AI/SNS/Menuはまだダミー)
  ・【Sprint8追加】Projects/Portfolio画面をSpreadsheet接続(projects/portfolio/
    portfolio_history/portfolio_releases/portfolio_fixesシートを使用)
  ※接続前にrender側/normalize側/Code.gs側のフィールド名を4点照合済み(不整合なし)。
  ※Spreadsheet側にportfolio関連4シートの追加作成が必要(翔側の作業)。
  設計方針: 開発仕様書 v1.0 第1〜12章に準拠
    - 1機能=1コンポーネント、カードは独立
    - Canva素材は差し替え可能(ASSETS)。無くても崩れないUI
    - Data Layerを経由(将来GAS API化を見据え、関数はPromiseで統一)
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
/* ============================================================
   1. DESIGN TOKENS (開発仕様書 第3章・第10章)
   ============================================================ */
:root{
  /* Color */
  --c-navy-900:#0A1B33;
  --c-navy-700:#14304F;
  --c-navy-500:#3A5C82;
  --c-orange-500:#FF6A2C;
  --c-orange-600:#E8571E;
  --c-orange-100:#FFEDE3;
  --c-green-500:#1FA463;
  --c-green-100:#E4F6EC;
  --c-red-500:#E5484D;
  --c-red-100:#FDE8E8;
  --c-bg:#FFFFFF;
  --c-surface:#F4F5F7;
  --c-border:#E8EAEF;
  --c-text-900:#10151F;
  --c-text-500:#6B7280;
  --c-text-300:#A7ACB6;

  /* Radius (第10章-5) */
  --r-card:16px;
  --r-btn:12px;
  --r-input:12px;
  --r-modal:20px;
  --r-chip:999px;

  /* Spacing (第10章-4) */
  --sp-screen:20px;
  --sp-card-gap:16px;
  --sp-card-pad:18px;
  --sp-title-gap:8px;
  --sp-btn-gap:12px;

  /* Shadow (第10章-6: 弱い影のみ) */
  --shadow-sm:0 1px 2px rgba(16,21,31,0.05), 0 1px 1px rgba(16,21,31,0.03);
  --shadow-md:0 6px 20px rgba(10,27,51,0.07);

  /* Motion (第10章-11: 150〜250ms) */
  --dur-fast:150ms;
  --dur-base:200ms;
  --dur-slow:260ms;
  --ease:cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--c-bg);
  color:var(--c-text-900);
  font-family:'Zen Kaku Gothic New', -apple-system, 'Hiragino Sans', sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
button{font-family:inherit;}
img{max-width:100%;display:block;}

/* prefers-reduced-motion対応 */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

.tabular-num{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1; }

/* ============================================================
   2. APP SHELL
   ============================================================ */
#app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
  position:relative;
}

/* ---- Header (第4章-3 / 第12章-3) ---- */
.co-header{
  padding:calc(env(safe-area-inset-top) + 18px) var(--sp-screen) 4px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.co-header__greeting-eyebrow{
  font-size:12px;
  color:var(--c-text-500);
  margin:0 0 4px;
  letter-spacing:.02em;
}
.co-header__greeting{
  font-size:20px;
  font-weight:700;
  margin:0 0 6px;
  line-height:1.3;
}
.co-header__streak{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:700;
  color:var(--c-orange-600);
  background:var(--c-orange-100);
  padding:4px 10px 4px 8px;
  border-radius:var(--r-chip);
}
.co-header__streak svg{width:13px;height:13px;}
.co-header__actions{
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.co-icon-btn{
  width:38px;height:38px;
  border-radius:11px;
  border:1px solid var(--c-border);
  background:var(--c-bg);
  display:flex;align-items:center;justify-content:center;
  color:var(--c-navy-900);
  cursor:pointer;
  transition:transform var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
  position:relative;
}
.co-icon-btn:active{transform:scale(0.92); background:var(--c-surface);}
.co-icon-btn svg{width:19px;height:19px;}
.co-icon-btn__dot{
  position:absolute; top:8px; right:8px;
  width:7px;height:7px;border-radius:50%;
  background:var(--c-orange-500);
  border:1.5px solid var(--c-bg);
}

/* ---- Section shell ---- */
.co-section{
  padding:10px var(--sp-screen) 0;
}

/* 【Sprint13】前回データ表示バナー */
.co-stalebanner{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:var(--r-card);
  background:var(--c-orange-100);
  color:var(--c-orange-600);
  font-size:12.5px;
  font-weight:600;
  line-height:1.4;
}
.co-stalebanner svg{ width:16px; height:16px; flex-shrink:0; }
.co-section__head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:var(--sp-title-gap);
  padding:0 2px;
}
.co-section__title{
  font-size:14px;
  font-weight:700;
  color:var(--c-text-900);
  margin:0;
  display:flex;
  align-items:center;
  gap:6px;
}
.co-section__link{
  font-size:12px;
  color:var(--c-text-500);
  background:none;border:none;
  cursor:pointer;
  padding:4px;
}

/* ---- Generic Card (第10章-9 / 第12章-5) ---- */
.co-card{
  background:var(--c-bg);
  border:1px solid var(--c-border);
  border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);
  padding:var(--sp-card-pad);
  margin-bottom:var(--sp-card-gap);
  /* Canva背景差し替えポイント: background-image は JS(applyImageAsset)で付与 */
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(10px);
  animation:coCardEnter var(--dur-slow) var(--ease) forwards;
}
@keyframes coCardEnter{
  to{opacity:1; transform:translateY(0);}
}

/* ============================================================
   3. SKELETON LOADING (第10章-12: スピナー禁止, Skeleton基本)
   ============================================================ */
.co-skel-card{
  height:88px;
  border-radius:var(--r-card);
  background:var(--c-surface);
  margin-bottom:var(--sp-card-gap);
  position:relative;
  overflow:hidden;
}
.co-skel-card::after{
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  transform:translateX(-100%);
  animation:coShimmer 1.3s infinite;
}
@keyframes coShimmer{ to{ transform:translateX(100%); } }

/* ============================================================
   4. ミッションカード (第4章-4 / 第12章-17)
   ============================================================ */
.co-mission{
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 4px;
  border-bottom:1px solid var(--c-border);
}
.co-mission:last-child{border-bottom:none;}
.co-mission__check{
  width:26px;height:26px;
  border-radius:9px;
  border:1.6px solid var(--c-border);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  background:var(--c-bg);
  transition:all var(--dur-base) var(--ease);
}
.co-mission__check svg{
  width:15px;height:15px;
  opacity:0;
  transform:scale(0.5);
  transition:all var(--dur-base) var(--ease);
  color:#fff;
}
.co-mission.is-done .co-mission__check{
  background:var(--c-orange-500);
  border-color:var(--c-orange-500);
}
.co-mission.is-done .co-mission__check svg{ opacity:1; transform:scale(1); }
.co-mission__body{flex:1; min-width:0;}
.co-mission__title{
  font-size:14.5px; font-weight:700; margin:0;
  transition:color var(--dur-base) var(--ease);
}
.co-mission.is-done .co-mission__title{ color:var(--c-text-300); text-decoration:line-through; }
.co-mission__meta{ font-size:11.5px; color:var(--c-text-500); margin-top:2px; font-weight:700; }
.co-mission__meta[data-axis="開発"]{ color:var(--c-navy-700); }
.co-mission__meta[data-axis="発信"]{ color:var(--c-orange-600); }
.co-mission__meta[data-axis="収益化"]{ color:var(--c-green-500); }
.co-mission__priority{
  font-size:10.5px;
  font-weight:700;
  padding:3px 8px;
  border-radius:var(--r-chip);
  flex-shrink:0;
}
.co-mission__priority[data-level="high"]{ background:var(--c-red-100); color:var(--c-red-500); }
.co-mission__priority[data-level="normal"]{ background:var(--c-surface); color:var(--c-text-500); }

.co-xp-pop{
  position:fixed;
  font-size:13px; font-weight:700;
  color:var(--c-orange-600);
  pointer-events:none;
  z-index:80;
  animation:coXpPop 900ms var(--ease) forwards;
}
@keyframes coXpPop{
  0%{ opacity:0; transform:translateY(0) scale(0.8); }
  20%{ opacity:1; transform:translateY(-6px) scale(1); }
  100%{ opacity:0; transform:translateY(-34px) scale(1); }
}

/* ============================================================
   5. AIブリーフィング (第4章-5)
   ============================================================ */
.co-briefing{
  background:linear-gradient(135deg, var(--c-navy-900), var(--c-navy-700));
  color:#fff;
  border:none;
}
.co-briefing__label{
  display:flex; align-items:center; gap:6px;
  font-size:11.5px; font-weight:700;
  color:rgba(255,255,255,0.65);
  margin-bottom:10px;
}
.co-briefing__label svg{ width:13px;height:13px; color:var(--c-orange-500); }
.co-briefing__item{
  display:flex; gap:8px;
  font-size:13.5px;
  line-height:1.6;
  padding:6px 0;
  color:rgba(255,255,255,0.94);
}
.co-briefing__item + .co-briefing__item{ border-top:1px solid rgba(255,255,255,0.1); }
.co-briefing__dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--c-orange-500);
  margin-top:8px; flex-shrink:0;
}

/* ============================================================
   6. Quick Actions (第4章-12 / 第9章-6)
   ============================================================ */
.co-qa-row{
  display:flex; gap:10px;
  overflow-x:auto;
  padding:2px 20px 6px;
  margin:0 -20px;
  scrollbar-width:none;
}
.co-qa-row::-webkit-scrollbar{display:none;}
.co-qa{
  flex:0 0 auto;
  width:74px;
  display:flex; flex-direction:column; align-items:center; gap:7px;
  background:none; border:none; cursor:pointer;
  padding:2px 0;
}
.co-qa__icon{
  width:50px;height:50px;
  border-radius:15px;
  background:var(--c-surface);
  display:flex;align-items:center;justify-content:center;
  color:var(--c-navy-900);
  transition:transform var(--dur-fast) var(--ease);
}
.co-qa:active .co-qa__icon{ transform:scale(0.9); }
.co-qa__icon svg{ width:21px;height:21px; }
.co-qa__label{ font-size:11px; color:var(--c-text-500); font-weight:500; text-align:center; }

/* ============================================================
   7. KPI (第4章-7 / 第12章-18)
   ============================================================ */
.co-kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--sp-card-gap);
}
.co-kpi{ margin-bottom:0; cursor:pointer; }
.co-kpi__title{ font-size:12px; color:var(--c-text-500); margin:0 0 8px; font-weight:500; display:flex; align-items:center; gap:6px; }
.co-kpi__axis{
  font-size:9.5px; font-weight:700;
  padding:2px 6px; border-radius:var(--r-chip);
}
.co-kpi__axis[data-axis="開発"]{ background:rgba(20,48,79,0.08); color:var(--c-navy-700); }
.co-kpi__axis[data-axis="発信"]{ background:var(--c-orange-100); color:var(--c-orange-600); }
.co-kpi__axis[data-axis="収益化"]{ background:var(--c-green-100); color:var(--c-green-500); }
.co-kpi__value{ font-size:23px; font-weight:900; letter-spacing:-.01em; }
.co-kpi__unit{ font-size:12px; font-weight:700; color:var(--c-text-500); margin-left:1px; }
.co-kpi__delta{
  display:inline-flex; align-items:center; gap:3px;
  font-size:11px; font-weight:700; margin-top:6px;
}
.co-kpi__delta svg{ width:11px;height:11px; }
.co-kpi__delta[data-dir="up"]{ color:var(--c-green-500); }
.co-kpi__delta[data-dir="down"]{ color:var(--c-red-500); }
.co-kpi__delta[data-dir="flat"]{ color:var(--c-text-300); }

/* ============================================================
   8. Project / Progress (第4章-8)
   ============================================================ */
.co-project{ display:flex; flex-direction:column; gap:2px; padding:10px 2px; }
.co-project + .co-project{ border-top:1px solid var(--c-border); }
.co-project__top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.co-project__name{ font-size:14px; font-weight:700; display:flex; align-items:center; gap:7px;}
.co-project__dot{ width:7px;height:7px;border-radius:50%; flex-shrink:0; }
.co-project__pct{ font-size:12.5px; font-weight:700; color:var(--c-text-500); }
.co-progress{
  height:6px; border-radius:99px; background:var(--c-surface); overflow:hidden;
}
.co-progress__bar{
  height:100%; border-radius:99px;
  background:var(--c-orange-500);
  width:0%;
  transition:width 900ms var(--ease);
}
.co-project__meta{ font-size:11px; color:var(--c-text-500); margin-top:6px; }

/* ============================================================
   9. SNS状況 (第4章-9)
   ============================================================ */
.co-sns-row{ display:flex; gap:10px; }
.co-sns{
  flex:1;
  background:var(--c-surface);
  border-radius:12px;
  padding:12px 10px;
  text-align:center;
}
.co-sns__badge{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 8px;
  font-size:11px;font-weight:900;color:#fff;
}
.co-sns__value{ font-size:16px; font-weight:900; }
.co-sns__label{ font-size:10.5px; color:var(--c-text-500); margin-top:2px; }

/* ============================================================
   10. Recent Activity (第4章-11)
   ============================================================ */
.co-timeline__item{ display:flex; gap:12px; padding:9px 2px; }
.co-timeline__item + .co-timeline__item{ border-top:1px solid var(--c-border); }
.co-timeline__icon{
  width:30px;height:30px;border-radius:9px;
  background:var(--c-surface);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0; color:var(--c-navy-900);
}
.co-timeline__icon svg{ width:15px;height:15px; }
.co-timeline__title{ font-size:13.5px; font-weight:700; margin:0; }
.co-timeline__time{ font-size:11px; color:var(--c-text-500); margin-top:1px; }

/* ============================================================
   11. Empty State (第10章-13)
   ============================================================ */
.co-empty{
  text-align:center;
  padding:56px 24px 40px;
}
.co-empty__icon{
  width:52px;height:52px;border-radius:16px;
  background:var(--c-surface);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px; color:var(--c-text-300);
}
.co-empty__icon svg{ width:24px;height:24px; }
.co-empty__title{ font-size:15px; font-weight:700; margin:0 0 6px; }
.co-empty__desc{ font-size:13px; color:var(--c-text-500); margin:0 0 18px; line-height:1.6; }
.co-empty__btn{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--c-navy-900); color:#fff;
  border:none; border-radius:var(--r-btn);
  padding:11px 18px; font-size:13px; font-weight:700;
  cursor:pointer;
}

/* ============================================================
   11b. Modal (第10章-15 / 第12章-10)
   ============================================================ */
.co-modal-backdrop{
  position:fixed; inset:0; z-index:120;
  background:rgba(10,16,26,0.42);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity var(--dur-base) var(--ease);
}
.co-modal-backdrop.is-open{ opacity:1; pointer-events:auto; }
.co-modal-sheet{
  width:100%; max-width:520px; max-height:86vh;
  overflow-y:auto;
  background:var(--c-bg);
  border-radius:var(--r-modal) var(--r-modal) 0 0;
  padding:14px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);
  transition:transform var(--dur-slow) var(--ease);
}
.co-modal-backdrop.is-open .co-modal-sheet{ transform:translateY(0); }
.co-modal-handle{ width:36px;height:4px;border-radius:99px;background:var(--c-border); margin:0 auto 16px; }
.co-modal-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
.co-modal-title{ font-size:17px; font-weight:900; margin:0; line-height:1.3; }
.co-modal-subtitle{ font-size:12px; color:var(--c-text-500); margin:4px 0 0; }
.co-modal-close{
  width:32px;height:32px;border-radius:10px;border:none;
  background:var(--c-surface); color:var(--c-text-500);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0; cursor:pointer;
}
.co-modal-close svg{ width:16px;height:16px; }
.co-modal-section{ margin-bottom:16px; }
.co-modal-section__label{ font-size:11.5px; font-weight:700; color:var(--c-text-500); margin:0 0 8px; }
.co-modal-section p{ font-size:13.5px; line-height:1.7; margin:0; }
.co-modal-chip-row{ display:flex; flex-wrap:wrap; gap:6px; }
.co-modal-chip{ font-size:11.5px; font-weight:700; background:var(--c-surface); color:var(--c-navy-900); padding:5px 10px; border-radius:var(--r-chip); }
.co-modal-link-row{ display:flex; align-items:center; gap:8px; background:var(--c-surface); border-radius:11px; padding:10px 12px; margin-bottom:8px; }
.co-modal-link-row svg{ width:16px;height:16px; color:var(--c-text-500); flex-shrink:0; }
.co-modal-link-row span{ flex:1; font-size:12.5px; color:var(--c-text-900); word-break:break-all; }
.co-modal-copy-btn{ border:none; background:var(--c-bg); border-radius:8px; padding:5px 9px; font-size:11px; font-weight:700; color:var(--c-navy-700); cursor:pointer; flex-shrink:0; }
.co-modal-list-item{ display:flex; gap:10px; padding:7px 0; font-size:13px; }
.co-modal-list-item + .co-modal-list-item{ border-top:1px solid var(--c-border); }
.co-modal-list-item__date{ color:var(--c-text-300); font-size:11.5px; flex-shrink:0; width:38px; }
.co-modal-shot{
  width:100%; aspect-ratio:16/9; border-radius:12px;
  background:linear-gradient(135deg, var(--c-surface), #eef0f3);
  display:flex; align-items:center; justify-content:center;
  color:var(--c-text-300);
  background-size:cover; background-position:center;
}
.co-modal-shot svg{ width:26px;height:26px; }
.co-modal-empty-note{ font-size:12.5px; color:var(--c-text-300); }

/* ============================================================
   11c. Projects / Portfolio
   ============================================================ */
.co-devcard{ cursor:pointer; }
.co-devcard__meta-row{ display:flex; align-items:center; justify-content:space-between; font-size:11.5px; color:var(--c-text-500); margin-top:8px; }
.co-devcard__meta-row svg{ width:14px;height:14px; color:var(--c-text-300); }

.co-portfolio-card{ display:flex; flex-direction:column; gap:10px; cursor:pointer; }
.co-portfolio-card__top{ display:flex; align-items:center; gap:12px; }
.co-portfolio-card__badge{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;

}
.co-portfolio-card__name{ font-size:14.5px; font-weight:800; margin:0; }
.co-portfolio-card__tag{ font-size:10.5px; font-weight:700; color:var(--c-green-500); background:var(--c-green-100); padding:2px 8px; border-radius:var(--r-chip); margin-top:3px; display:inline-block; }
.co-portfolio-card__chevron{ margin-left:auto; color:var(--c-text-300); flex-shrink:0; }
.co-portfolio-card__chevron svg{ width:18px;height:18px; }
.co-portfolio-card__summary{ font-size:12.5px; color:var(--c-text-500); line-height:1.6; margin:0; }
.co-portfolio-add{

}

/* ============================================================
   11c-2. GitHub履歴 / 開発タイムライン (Sprint10.3)
   ------------------------------------------------------------
   ・GitHub履歴は各開発中プロジェクトカードの直下に表示する共通コンポーネント。
     将来リポジトリが増えても renderGithubHistoryItem() が同じ形で使い回せる。
   ・開発タイムラインはProjects画面の一番下に表示し、Sprintの区切りなど
     「今日何を進めたか」を時系列で見せる。将来note/X/TikTokの発信履歴も
     同じ構造(source違い)で合流させる想定(#co-timeline-source-*)。
   ============================================================ */
.co-github-history{ margin-top:10px; padding-top:10px; border-top:1px solid var(--c-border); }
.co-github-history__label{ font-size:11px; font-weight:700; color:var(--c-text-500); margin:0 0 8px; display:flex; align-items:center; gap:5px; }
.co-github-history__label svg{ width:13px;height:13px; }
.co-github-item{ display:flex; flex-direction:column; gap:4px; padding:9px 8px; border-radius:10px; cursor:pointer; transition:background var(--dur-fast) var(--ease); }
.co-github-item:active{ background:var(--c-surface); }
.co-github-item + .co-github-item{ border-top:1px solid var(--c-border); }
.co-github-item__top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.co-github-item__date{ font-size:10.5px; color:var(--c-text-300); font-weight:700; flex-shrink:0; }
.co-github-item__repo{ font-size:9.5px; font-weight:700; color:var(--c-navy-700); background:rgba(20,48,79,0.07); padding:2px 7px; border-radius:var(--r-chip); }
.co-github-item__title{ font-size:12.5px; font-weight:600; margin:0; line-height:1.4; }
.co-github-item__meta{ display:flex; align-items:center; gap:10px; font-size:10.5px; color:var(--c-text-500); }
.co-github-item__meta span{ display:inline-flex; align-items:center; gap:3px; }
.co-github-item__meta svg{ width:11px;height:11px; }
.co-github-item__tag{ font-size:9.5px; font-weight:700; color:var(--c-orange-600); background:var(--c-orange-100); padding:1px 7px; border-radius:var(--r-chip); }
.co-github-history__empty{ font-size:11.5px; color:var(--c-text-300); padding:6px 2px; }

.co-timeline2{ display:flex; flex-direction:column; }
.co-timeline2-item{ display:flex; gap:12px; padding:11px 2px; position:relative; }
.co-timeline2-item + .co-timeline2-item{ border-top:1px solid var(--c-border); }
.co-timeline2-item__dot{ width:30px;height:30px;border-radius:9px; background:var(--c-surface); display:flex;align-items:center;justify-content:center; flex-shrink:0; color:var(--c-navy-900); }
.co-timeline2-item__dot svg{ width:14px;height:14px; }
.co-timeline2-item__body{ flex:1; min-width:0; }
.co-timeline2-item__label{ font-size:13.5px; font-weight:700; margin:0; }
.co-timeline2-item__meta{ font-size:11px; color:var(--c-text-500); margin-top:2px; }

/* ============================================================
   11d. AI秘書
   ============================================================ */
.co-agent-grid{ display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-card-gap); }
.co-agent{ display:flex; flex-direction:column; gap:8px; }
.co-agent__avatar{ width:36px;height:36px;border-radius:11px; display:flex;align-items:center;justify-content:center; color:#fff; font-weight:900; font-size:13px; }
.co-agent__name{ font-size:14px; font-weight:800; margin:2px 0 0; }
.co-agent__role{ font-size:11px; color:var(--c-text-500); line-height:1.5; }
.co-status-badge{ font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:var(--r-chip); display:inline-flex; align-items:center; gap:4px; width:fit-content; }
.co-status-badge::before{ content:""; width:6px;height:6px;border-radius:50%; }
.co-status-badge[data-status="待機中"]{ background:var(--c-surface); color:var(--c-text-500); }
.co-status-badge[data-status="待機中"]::before{ background:var(--c-text-300); }
.co-status-badge[data-status="作業中"]{ background:var(--c-orange-100); color:var(--c-orange-600); }
.co-status-badge[data-status="作業中"]::before{ background:var(--c-orange-500); }
.co-status-badge[data-status="レビュー待ち"]{ background:rgba(20,48,79,0.08); color:var(--c-navy-700); }
.co-status-badge[data-status="レビュー待ち"]::before{ background:var(--c-navy-700); }
.co-status-badge[data-status="完了"]{ background:var(--c-green-100); color:var(--c-green-500); }
.co-status-badge[data-status="完了"]::before{ background:var(--c-green-500); }
.co-status-badge[data-status="エラー"]{ background:var(--c-red-100); color:var(--c-red-500); }
.co-status-badge[data-status="エラー"]::before{ background:var(--c-red-500); }
/* 【Sprint14】Content Stock用ステータス色 */
.co-status-badge[data-status="idea"]{ background:var(--c-surface); color:var(--c-text-500); }
.co-status-badge[data-status="idea"]::before{ background:var(--c-text-300); }
.co-status-badge[data-status="draft"]{ background:var(--c-orange-100); color:var(--c-orange-600); }
.co-status-badge[data-status="draft"]::before{ background:var(--c-orange-500); }
.co-status-badge[data-status="review"]{ background:rgba(20,48,79,0.08); color:var(--c-navy-700); }
.co-status-badge[data-status="review"]::before{ background:var(--c-navy-700); }
.co-status-badge[data-status="approved"]{ background:var(--c-green-100); color:var(--c-green-500); }
.co-status-badge[data-status="approved"]::before{ background:var(--c-green-500); }
.co-status-badge[data-status="posted"]{ background:var(--c-navy-900); color:#fff; }
.co-status-badge[data-status="posted"]::before{ background:#fff; }

/* 【Sprint14】Content Stock 一覧・フォーム */
.co-cs-item{
  padding:12px 4px;
  border-bottom:1px solid var(--c-border);
  display:flex;
  flex-direction:column;
  gap:6px;
}
.co-cs-item:last-child{ border-bottom:none; }
.co-cs-item__top{ display:flex; align-items:center; gap:8px; }
.co-cs-item__title{ font-size:14px; font-weight:800; flex:1; margin:0; }
.co-cs-item__meta{ font-size:11px; color:var(--c-text-500); display:flex; gap:6px; flex-wrap:wrap; }
.co-cs-item__idea{ font-size:12.5px; color:var(--c-text-500); margin:0; line-height:1.5; }
.co-cs-item__controls{ display:flex; gap:8px; margin-top:2px; }
.co-cs-select{

}
.co-cs-empty{ padding:24px 4px; text-align:center; color:var(--c-text-500); font-size:13px; }
.co-cs-fab{
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:12px; border-radius:var(--r-card);

  border:none; margin-bottom:14px;
}
.co-cs-fab svg{ width:16px; height:16px; }
.co-cs-form label{ display:block; font-size:12px; font-weight:700; color:var(--c-text-500); margin:14px 0 6px; }
.co-cs-form input[type="text"],
.co-cs-form select,
.co-cs-form textarea{
  width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--c-border);

}
.co-cs-form textarea{ min-height:70px; resize:vertical; }
.co-cs-form__submit{

}
.co-cs-recommend-badge{
  font-size:10px; font-weight:700; color:var(--c-orange-600); background:var(--c-orange-100);

}
.co-cs-detail-link{
  display:flex; align-items:center; justify-content:space-between; gap:6px;
  width:100%; margin-top:4px; padding:9px 2px; border:none; background:none;
  font-size:12px; font-weight:700; color:var(--c-navy-700); text-align:left;
}
.co-cs-detail-link svg{ width:16px; height:16px; flex-shrink:0; color:var(--c-text-300); }

/* 【Sprint15】AIリサーチ候補: 採用/保留/却下ボタン */
.co-rc-actions{ display:flex; gap:8px; margin-top:8px; }
.co-rc-btn{ flex:1; padding:8px 6px; border-radius:10px; border:none; font-size:12px; font-weight:700; }

.co-template-row{ display:flex; gap:8px; overflow-x:auto; padding:2px 20px 4px; margin:0 -20px; scrollbar-width:none; }

.co-template-chip{ flex:0 0 auto; font-size:12px; font-weight:700; background:var(--c-surface); border:none; color:var(--c-navy-900); padding:8px 13px; border-radius:var(--r-chip); cursor:pointer; }

.co-composer{ display:flex; flex-direction:column; gap:10px; }
.co-composer textarea{
  width:100%; border:1px solid var(--c-border); border-radius:var(--r-input);

}

.co-composer__row{ display:flex; gap:8px; }
.co-btn-primary{

  background:var(--c-navy-900); color:#fff; border:none; border-radius:var(--r-btn);
  padding:11px 14px; font-size:13px; font-weight:700; cursor:pointer;
}

.co-btn-ghost{
  width:44px; display:flex; align-items:center; justify-content:center;

}

.co-request-item{ display:flex; align-items:center; gap:10px; padding:9px 2px; }
.co-request-item + .co-request-item{ border-top:1px solid var(--c-border); }
.co-request-item__ai{ width:28px;height:28px;border-radius:9px; display:flex;align-items:center;justify-content:center; color:#fff; font-size:10px; font-weight:900; flex-shrink:0; }
.co-request-item__text{ flex:1; font-size:13px; font-weight:600; }
.co-request-item__date{ font-size:11px; color:var(--c-text-300); flex-shrink:0; }

/* ============================================================
   11e. SNS
   ============================================================ */
.co-platform-card{ margin-bottom:var(--sp-card-gap); cursor:pointer; }
.co-platform-card__top{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.co-platform-card__badge{ width:32px;height:32px;border-radius:10px; display:flex;align-items:center;justify-content:center; color:#fff; font-size:11px; font-weight:900; flex-shrink:0; }
.co-platform-card__label{ font-size:14px; font-weight:800; margin:0; }

/* ============================================================
   11f. Menu
   ============================================================ */
.co-menu-profile{ display:flex; align-items:center; gap:14px; }
.co-menu-avatar{ width:52px;height:52px;border-radius:16px; background:linear-gradient(135deg, var(--c-navy-900), var(--c-navy-700)); color:#fff; font-size:18px; font-weight:900; display:flex;align-items:center;justify-content:center; flex-shrink:0; }
.co-menu-profile__name{ font-size:16px; font-weight:800; margin:0; }

.co-menu-row__icon{ width:36px;height:36px;border-radius:11px; background:var(--c-surface); display:flex;align-items:center;justify-content:center; color:var(--c-navy-900); flex-shrink:0; }

.co-menu-row__label{ flex:1; font-size:14px; font-weight:700; }

}

/* ============================================================
   11g. 【Sprint11】CEOレベル / フェーズ / 投資管理 / 実績バッジ
   ------------------------------------------------------------
   HOMEは軽さ優先: レベルバー1本+フェーズカード1枚のみ。
   詳細(投資明細・バッジ一覧・レベル詳細)はMenuのModalへ逃がす。
   ============================================================ */
.co-levelbar{
  display:flex; align-items:center; gap:12px;
  cursor:pointer;
}
.co-levelbar__badge{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg, var(--c-navy-900), var(--c-navy-700));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; flex-shrink:0;
}
.co-levelbar__body{ flex:1; min-width:0; }

.co-levelbar__label{ font-size:12.5px; font-weight:800; }
.co-levelbar__xp{ font-size:10.5px; color:var(--c-text-500); font-weight:700; }
.co-levelbar__track{ height:6px; border-radius:99px; background:var(--c-surface); overflow:hidden; }
.co-levelbar__fill{ height:100%; border-radius:99px; background:linear-gradient(90deg, var(--c-orange-500), var(--c-orange-600)); width:0%; transition:width 900ms var(--ease); }

.co-phasecard{ cursor:pointer; }
.co-phasecard__top{ display:flex; align-items:center; gap:12px; }
.co-phasecard__emoji{ font-size:26px; line-height:1; flex-shrink:0; }
.co-phasecard__label{ font-size:14.5px; font-weight:800; margin:0; }
.co-phasecard__step{ font-size:11px; color:var(--c-text-500); margin-top:2px; }
.co-phasecard__desc{ font-size:12.5px; color:var(--c-text-500); margin:10px 0 0; line-height:1.6; }
.co-phasecard__chevron{ margin-left:auto; color:var(--c-text-300); flex-shrink:0; }
.co-phasecard__chevron svg{ width:18px;height:18px; }

.co-phase-journey{ display:flex; flex-direction:column; }
.co-phase-journey-item{ display:flex; gap:12px; padding:10px 0; }
.co-phase-journey-item + .co-phase-journey-item{ border-top:1px solid var(--c-border); }
.co-phase-journey-item__emoji{ font-size:20px; width:30px; text-align:center; flex-shrink:0; opacity:0.35; }
.co-phase-journey-item.is-current .co-phase-journey-item__emoji{ opacity:1; }
.co-phase-journey-item__body{ flex:1; }
.co-phase-journey-item__label{ font-size:13.5px; font-weight:700; color:var(--c-text-300); margin:0; }
.co-phase-journey-item.is-current .co-phase-journey-item__label{ color:var(--c-text-900); }
.co-phase-journey-item__now{ font-size:10px; font-weight:700; color:var(--c-orange-600); background:var(--c-orange-100); padding:2px 8px; border-radius:var(--r-chip); margin-left:6px; }

.co-invest-hero{ text-align:center; padding:6px 0 4px; }
.co-invest-hero__value{ font-size:28px; font-weight:900; }
.co-invest-hero__label{ font-size:11.5px; color:var(--c-text-500); margin-top:4px; }
.co-invest-gauge{ height:8px; border-radius:99px; background:var(--c-surface); overflow:hidden; margin:14px 0 8px; }

.co-invest-gauge__label{ font-size:11.5px; color:var(--c-text-500); text-align:center; }
.co-invest-item{ display:flex; align-items:center; justify-content:space-between; padding:9px 2px; }
.co-invest-item + .co-invest-item{ border-top:1px solid var(--c-border); }
.co-invest-item__name{ font-size:13.5px; font-weight:700; }
.co-invest-item__amount{ font-size:13px; font-weight:800; color:var(--c-text-500); }
.co-invest-message{ font-size:12.5px; color:var(--c-text-500); line-height:1.7; margin:0 0 6px; }

.co-badge-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.co-badge{ display:flex; flex-direction:column; align-items:center; gap:8px; padding:16px 8px; border-radius:14px; background:var(--c-surface); text-align:center; }
.co-badge__icon{ width:42px;height:42px;border-radius:13px; display:flex; align-items:center; justify-content:center; background:var(--c-bg); color:var(--c-text-300); }

.co-badge.is-unlocked .co-badge__label{ color:var(--c-text-900); }

/* ============================================================
   11h. 【Sprint12】ルールベースAI秘書カード
   ------------------------------------------------------------
   AIブリーフィング(既存, ネイビー背景)とは視覚的に区別するため、

.co-aiadvice__head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }

.co-aiadvice__avatar svg{ width:15px;height:15px; }
.co-aiadvice__title{ font-size:12.5px; font-weight:800; margin:0; }

.co-aiadvice__dot{ width:5px;height:5px;border-radius:50%; background:var(--c-orange-500); margin-top:8px; flex-shrink:0; }

/* ============================================================
   12. Bottom Navigation (第9章-12 / 第12章-4)
   ============================================================ */
.co-bottomnav{
  position:fixed; left:0; right:0; bottom:0;
  max-width:520px; margin:0 auto;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--c-border);
  display:flex;
  padding:8px 6px calc(6px + env(safe-area-inset-bottom));
  z-index:60;
}
.co-navitem{
  flex:1;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; cursor:pointer;
  padding:6px 0;
  color:var(--c-text-300);

 * 読み込みに失敗/未設定の場合はfallbackClassのCSSに任せて崩れないようにする。
 */
function applyImageAsset(el, url, fallbackClass) {
  if (!url) {
    if (fallbackClass) el.classList.add(fallbackClass);
    return;
  }
  const probe = new Image();
  probe.onload = () => { el.style.backgroundImage = `url("${url}")`; };
  probe.onerror = () => { if (fallbackClass) el.classList.add(fallbackClass); };
  probe.src = url;
}

const API_URL = "https://script.google.com/macros/s/AKfycbzNaCJQm2wS4DLeDSFLxLGtCsX7O79MAdy0YDnvbE2tLl51Yyl1DTf-rXxK2JXhpCuJiA/exec";

  home: true,
  projects: true,
  ai: false,
  sns: false,
  menu: true,
  contentStock: true,
  aiResearch: true
};

function shouldUseApi(screen) {
  return !DEV_MODE && !!API_URL && !!API_ENABLED_SCREENS[screen];

const Logger = {
  info(...args) { if (DEV_MODE) console.log("[INFO]", ...args); },
  warn(...args) { if (DEV_MODE) console.warn("[WARN]", ...args); },
  error(...args) { if (DEV_MODE) console.error("[ERROR]", ...args); }
};

const AUTH_TOKEN = null;

function buildAuthHeaders() {
  return AUTH_TOKEN ? { Authorization: AUTH_TOKEN } : {};
}

const SUPPORTED_VERSION = "1.0";

const API_TIMEOUT_MS = 20000;

async function apiRequest(action, params = {}, method = "GET") {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
  try {
    let res;
    if (method === "GET") {
      const url = new URL(API_URL);
      url.searchParams.set("action", action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      res = await fetch(url.toString(), { signal: controller.signal, headers: buildAuthHeaders() });
    } else {
      res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain", ...buildAuthHeaders() },
        body: JSON.stringify({ action, ...params }),
        signal: controller.signal
      });
    }
    if (!res.ok) throw new Error(`API error (${action}): ${res.status}`);

    const json = await res.json();
    if (!json || typeof json !== "object") throw new Error(`API error (${action}): 不正なレスポンス形式`);
    if (json.error) throw new Error(`API error (${action}): ${json.error}`);
    if (!json.version) {
      Logger.warn(`apiRequest(${action}): レスポンスにversionがありません`, json);
    } else if (json.version !== SUPPORTED_VERSION) {
      Logger.warn(`apiRequest(${action}): APIバージョン不一致 (supported=${SUPPORTED_VERSION}, received=${json.version})`);
    }

    return json.data !== undefined ? json.data : json;
  } catch (err) {
    if (err.name === "AbortError") {
      throw new Error(`API error (${action}): タイムアウト(${API_TIMEOUT_MS}ms)`);
    }
    throw err;
  } finally {
    clearTimeout(timeoutId);
  }
}

/**

 * 【Sprint13】HOMEスナップショット(前回正常取得データの保存)
 * ------------------------------------------------------------
 * API取得が成功するたびに正規化済みデータをLocalStorageへ保存する。
 * 次回以降、API取得に失敗した場合はこのスナップショットを表示し、
 * 「前回データを表示しています」と分かるバナーを出す(黒画面・
 * いきなりダミー表示になる事態を避けるための保険)。
 * ============================================================ */
const HOME_SNAPSHOT_KEY = "ceoOS_v2_home_snapshot";

function saveHomeSnapshot_(data) {
  try {
    localStorage.setItem(HOME_SNAPSHOT_KEY, JSON.stringify({ data, fetchedAt: new Date().toISOString() }));
  } catch (e) {
    Logger.warn("[Snapshot] 保存に失敗しました", e);
  }
}

function loadHomeSnapshot_() {
  try {
    const raw = localStorage.getItem(HOME_SNAPSHOT_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.data || !parsed.fetchedAt) return null;
    return parsed;
  } catch (e) {
    return null;
  }
}

/** 最終正常取得日時を人が読める形式に整える(例: 7/11 15:57)。バナー表示用。 */
function formatStaleTimestamp_(iso) {
  try {
    const d = new Date(iso);
    return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  } catch (e) {
    return "";
  }
}

/* ============================================================
   2c. 正規化レイヤー
   ============================================================ */
function normalizeString(v, fallback = "") {
  return v === undefined || v === null ? fallback : String(v);
}
function normalizeNumber(v, fallback = 0) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}
function normalizeBoolean(v, fallback = false) {
  if (typeof v === "boolean") return v;
  if (v === undefined || v === null || v === "") return fallback;
  return String(v).toLowerCase() === "true";
}
function normalizeArray(v, itemNormalizer) {
  if (!Array.isArray(v)) return [];
  return itemNormalizer ? v.map(itemNormalizer) : v;
}
function normalizeEnum(v, allowed, fallback) {
  return allowed.includes(v) ? v : fallback;
}
function normalizeNumberArray(v, fallback = []) {
  return Array.isArray(v) ? v.map(Number).filter(Number.isFinite) : fallback;
}

const AXIS_VALUES = ["開発", "発信", "収益化"];
const KPI_DIR_VALUES = ["up", "down", "flat"];

function normalizeMission(m) {
  m = m || {};
  return {
    id: normalizeString(m.id),
    title: normalizeString(m.title, "無題のミッション"),
    axis: normalizeEnum(m.axis, AXIS_VALUES, "発信"),
    priority: m.priority === "high" ? "high" : "normal",
    xp: normalizeNumber(m.xp),
    done: normalizeBoolean(m.done)
  };
}
function normalizeKpiItem(k) {
  k = k || {};
  return {
    key: normalizeString(k.key),
    title: normalizeString(k.title),
    axis: normalizeEnum(k.axis, AXIS_VALUES, "発信"),
    value: normalizeNumber(k.value),
    unit: normalizeString(k.unit),
    deltaPct: normalizeNumber(k.deltaPct),
    dir: normalizeEnum(k.dir, KPI_DIR_VALUES, "flat"),
    icon: k.icon || "chart",
    history: Array.isArray(k.history) ? normalizeNumberArray(k.history) : undefined
  };
}

/* ---- 【Sprint10.3】GitHub履歴 / タイムラインの正規化 ---- */
function normalizeGithubCommit(c) {
  c = c || {};
  return {
    message: normalizeString(c.message),
    author: normalizeString(c.author),
    url: normalizeString(c.url)
  };
}
function normalizeGithubEvent(e) {
  e = e || {};
  return {
    date: normalizeString(e.date),
    title: normalizeString(e.title, "更新"),
    eventType: normalizeString(e.eventType, "push"),
    commitCount: normalizeNumber(e.commitCount),
    author: normalizeString(e.author, "unknown"),
    progressTag: (e.progressTag === "" || e.progressTag === undefined || e.progressTag === null) ? null : normalizeString(e.progressTag),
    releaseTag: (e.releaseTag === "" || e.releaseTag === undefined || e.releaseTag === null) ? null : normalizeString(e.releaseTag),
    repo: normalizeString(e.repo),
    repoLabel: normalizeString(e.repoLabel, normalizeString(e.repo)),
    filesChanged: normalizeNumber(e.filesChanged),
    commits: normalizeArray(e.commits, normalizeGithubCommit),
    link: normalizeString(e.link)
  };
}
function normalizeTimelineItem(t) {
  t = t || {};
  return {
    date: normalizeString(t.date),
    label: normalizeString(t.label, "更新"),
    source: normalizeString(t.source, "github"),
    type: normalizeString(t.type),
    target: normalizeString(t.target),
    link: normalizeString(t.link)
  };
}

function normalizeDevProject(p) {
  p = p || {};
  return {
    id: normalizeString(p.id),
    name: normalizeString(p.name),
    progress: Math.min(100, Math.max(0, normalizeNumber(p.progress))),
    color: p.color || "#FF6A2C",
    sprint: normalizeString(p.sprint),
    next: normalizeString(p.next),
    updatedAt: normalizeString(p.updatedAt),
    ai: normalizeString(p.ai),
    githubHistory: normalizeArray(p.githubHistory, normalizeGithubEvent)
  };
}
function normalizeActivityItem(a) {
  a = a || {};
  return { id: normalizeString(a.id), title: normalizeString(a.title), time: normalizeString(a.time), icon: a.icon || "sparkle" };
}
function normalizeHomeSnsItem(s) {
  s = s || {};
  return { key: normalizeString(s.key), label: normalizeString(s.label), color: s.color || "#0A1B33", value: normalizeString(s.value), sub: normalizeString(s.sub) };
}
/* ---- 【Sprint11】CEOレベル / フェーズ / 投資管理 / 実績バッジの正規化 ---- */

}

        if (snapshot) {

const CacheStrategies = {
  none: {
    get: () => null,
    set: () => {},
    clear: () => {}
  },
  memory: (() => {
    const store = new Map();
    return {
      get: (key) => (store.has(key) ? store.get(key) : null),
      set: (key, value) => store.set(key, value),
      clear: (key) => (key ? store.delete(key) : store.clear())
    };
  })()
};

const CACHE_STRATEGY = CacheStrategies.none;

async function withCache(key, fetcher) {
  const cached = CACHE_STRATEGY.get(key);
  if (cached !== null && cached !== undefined) {
    Logger.info(`[Repository] cache hit: ${key}`);
    return cached;
  }
  const fresh = await fetcher();
  CACHE_STRATEGY.set(key, fresh);
  return fresh;
}

const Repository = {
  getHomeData: () => withCache("home", () => DataLayer.getHomeData()),
  setMissionDone: async (missionId, done) => {

function timeGreeting() {
  const h = new Date().getHours();
  if (h < 11) return "おはよう";
  if (h < 18) return "こんにちは";
  return "おつかれさま";
}

function formatDate(d) {
  const w = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
  return `${d.getMonth() + 1}月${d.getDate()}日(${w})`;
}

function todayISO(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function toMD(d = new Date()) {
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function formatNumber(n) {
  return n.toLocaleString("ja-JP");
}

function animateCountUp(el, to, opts = {}) {
  const duration = opts.duration || 700;
  const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (prefersReduced) { el.textContent = formatNumber(to); return; }
  const start = performance.now();
  function tick(now) {
    const p = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = formatNumber(Math.round(to * eased));
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function showToast(message) {
  const wrap = document.getElementById("toast-wrap");
  const el = document.createElement("div");
  el.className = "co-toast";
  el.innerHTML = `<span>${message}</span>`;
  wrap.innerHTML = "";
  wrap.appendChild(el);
  setTimeout(() => {
    el.classList.add("is-leaving");
    setTimeout(() => el.remove(), 220);
  }, 1900);
}

function popXp(anchorEl, xp) {
  const rect = anchorEl.getBoundingClientRect();
  const el = document.createElement("div");
  el.className = "co-xp-pop";
  el.textContent = `+${xp} XP`;
  el.style.left = `${rect.left + rect.width / 2 - 16}px`;
  el.style.top = `${rect.top - 6}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function openModal(innerHtml) {
  const backdrop = document.getElementById("modal-backdrop");
  const sheet = backdrop.querySelector(".co-modal-sheet");
  sheet.innerHTML = `<div class="co-modal-handle"></div>${innerHtml}`;
  backdrop.classList.add("is-open");
  document.body.style.overflow = "hidden";
  const closeBtn = sheet.querySelector('[data-action="modal-close"]');
  if (closeBtn) closeBtn.addEventListener("click", closeModal);
}
function closeModal() {
  const backdrop = document.getElementById("modal-backdrop");
  backdrop.classList.remove("is-open");
  document.body.style.overflow = "";
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast("コピーしました");
  } catch (e) {
    showToast("コピーに失敗しました");
  }
}

function buildSparkline(values, color) {
  const w = 100, h = 30, pad = 3;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const points = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="30" preserveAspectRatio="none">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

/* ============================================================
   4b-2. 【Sprint10.3】GitHub履歴 / 開発タイムライン コンポーネント
   ------------------------------------------------------------
   共通コンポーネントとして設計。renderGithubHistoryItem() は
   どのリポジトリのイベントでも同じ形式(normalizeGithubEvent済み)
   を受け取って描画するだけなので、REPO_CONFIGにリポジトリが
   増えてもこちら側の変更は不要。
   ============================================================ */
const GITHUB_HISTORY_VISIBLE_COUNT = 5;

/** dev-idカードの下に差し込む「GitHub履歴」セクション。クリックはbindProjectsEventsで委譲する。 */
function renderGithubHistorySection(p) {
  const events = p.githubHistory || [];
  if (!events.length) {
    return `
      <div class="co-github-history">
        <p class="co-github-history__label">${icon("github")}GitHub履歴</p>
        <p class="co-github-history__empty">まだ更新履歴がありません。</p>
      </div>`;
  }
  const visible = events.slice(0, GITHUB_HISTORY_VISIBLE_COUNT);
  const rows = visible.map((e, idx) => renderGithubHistoryItem(e, p.id, idx)).join("");
  return `
    <div class="co-github-history">
      <p class="co-github-history__label">${icon("github")}GitHub履歴</p>
      ${rows}
    </div>`;
}

/** 1件分のGitHub履歴行。data-github-project / data-github-idx で後からイベント本体を引ける。 */
function renderGithubHistoryItem(e, projectId, idx) {
  const progressChip = e.progressTag ? `<span class="co-github-item__tag">進捗 ${e.progressTag}%</span>` : "";
  const releaseChip = e.releaseTag ? `<span class="co-github-item__tag">${e.releaseTag}</span>` : "";
  return `
    <div class="co-github-item" data-github-project="${projectId}" data-github-idx="${idx}">
      <div class="co-github-item__top">
        <span class="co-github-item__repo">${e.repoLabel}</span>
        <span class="co-github-item__date">${e.date}</span>
      </div>
      <p class="co-github-item__title">${e.title}</p>
      <div class="co-github-item__meta">
        <span>${icon("github")}${e.commitCount}件</span>
        <span>${icon("user")}${e.author}</span>
        ${progressChip}${releaseChip}
      </div>
    </div>`;
}

/** GitHub履歴1件の詳細Modal(コミット一覧・変更ファイル数・GitHubリンク・更新内容)。 */
function buildGithubEventDetailModal(e) {
  const commitsHtml = e.commits.length
    ? e.commits.map(c => `
        <div class="co-modal-list-item">
          <span style="flex:1;">${c.message}${c.author ? ` <span style="color:var(--c-text-300);">— ${c.author}</span>` : ""}</span>
        </div>`).join("")
    : `<p class="co-modal-empty-note">コミット詳細は記録されていません。</p>`;

  const linkHtml = e.link
    ? `<div class="co-modal-link-row">${icon("link")}<span>${e.link}</span><button class="co-modal-copy-btn" data-copy="${e.link}">コピー</button></div>`
    : "";

  return `
    <div class="co-modal-head">
      <div>
        <p class="co-modal-title">${e.repoLabel}</p>
        <p class="co-modal-subtitle">${e.date} ・ ${e.eventType === "release" ? "リリース" : "Push"} ・ ${e.author}</p>
      </div>
      <button class="co-modal-close" data-action="modal-close">${icon("close")}</button>
    </div>

    <div class="co-modal-section">
      <p class="co-modal-section__label">更新内容</p>
      <p>${e.title}</p>
      ${e.progressTag ? `<div class="co-modal-chip-row" style="margin-top:8px;"><span class="co-modal-chip">進捗タグ ${e.progressTag}%</span></div>` : ""}
      ${e.releaseTag ? `<div class="co-modal-chip-row" style="margin-top:8px;"><span class="co-modal-chip">${e.releaseTag}</span></div>` : ""}
    </div>

    <div class="co-modal-section">
      <p class="co-modal-section__label">${icon("files")}コミット一覧(${e.commitCount}件) ・ 変更ファイル ${e.filesChanged}件</p>
      ${commitsHtml}
    </div>

    ${linkHtml ? `<div class="co-modal-section"><p class="co-modal-section__label">${icon("github")}GitHubリンク</p>${linkHtml}</div>` : ""}`;
}

function bindProjectsEvents(container, data) {
  container.querySelectorAll("[data-dev-id]").forEach(el => {
    el.addEventListener("click", (ev) => {
      // GitHub履歴行のクリックはこちらのカード全体クリックとして扱わない
      if (ev.target.closest("[data-github-idx]")) return;
      const p = data.dev.find(d => d.id === el.dataset.devId);
      openModal(buildDevDetailModal(p));
    });
  });
  // 【Sprint10.3】GitHub履歴行のクリックで詳細Modalを開く(共通コンポーネント)
  container.querySelectorAll("[data-github-idx]").forEach(el => {
    el.addEventListener("click", (ev) => {
      ev.stopPropagation();
      const projectId = el.dataset.githubProject;
      const idx = Number(el.dataset.githubIdx);
      const p = data.dev.find(d => d.id === projectId);
      const event = p && p.githubHistory ? p.githubHistory[idx] : null;
      if (!event) return;
      openModal(buildGithubEventDetailModal(event));
      const copyBtn = document.querySelector(".co-modal-sheet [data-copy]");
      if (copyBtn) copyBtn.addEventListener("click", () => copyToClipboard(copyBtn.dataset.copy));
    });
  });
  container.querySelectorAll("[data-portfolio-id]").forEach(el => {
    el.addEventListener("click", () => {
      const p = data.portfolio.find(d => d.id === el.dataset.portfolioId);
      openModal(buildPortfolioDetailModal(p));
      const shotEl = document.getElementById("modal-shot");
      if (shotEl) applyImageAsset(shotEl, p.screenshot, null);
      const copyBtn = document.querySelector(".co-modal-sheet [data-copy]");
      if (copyBtn) copyBtn.addEventListener("click", () => copyToClipboard(copyBtn.dataset.copy));
    });
  });
  const addBtn = container.querySelector('[data-action="add-portfolio"]');
  if (addBtn) addBtn.addEventListener("click", () => showToast("実績の追加はSprint3以降で対応予定です"));
}

async function renderProjectsScreen() {
  const target = document.getElementById("screen-projects");
  target.innerHTML = renderSkeletonBlock([150, 110, 90, 90, 90, 90]);
  const data = await Repository.getProjectsData();

  target.innerHTML = `
    ${renderScreenTitle("Projects / Portfolio")}
    <section class="co-section" data-component="dev-projects">
      <div class="co-section__head"><p class="co-section__title">${icon("code")}開発中</p></div>
      ${data.dev.map(renderDevProjectCard).join("")}
    </section>
    <section class="co-section" data-component="portfolio">
      <div class="co-section__head"><p class="co-section__title">${icon("star")}Portfolio(実績)</p></div>
      ${data.portfolio.map(renderPortfolioCard).join("")}
      <button class="co-card co-portfolio-add" data-action="add-portfolio">${icon("plus")}<span>今後追加する実績</span></button>
    </section>
    ${renderTimelineSection(data.timeline)}`;

  animateEntrance(target);
  bindProjectsEvents(target, data);
  requestAnimationFrame(() => {
    target.querySelectorAll("[data-progress-to]").forEach(el => { el.style.width = `${el.dataset.progressTo}%`; });
  });
}

  return `

      <span class="co-request-item__text">${r.text}</span>

function bindAiEvents(container, data) {
  const templateRow = container.querySelector(".co-template-row");
  const textarea = container.querySelector("#ai-composer-input");
  if (templateRow && textarea) {
    templateRow.querySelectorAll(".co-template-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        textarea.value = textarea.value ? `${textarea.value} / ${chip.textContent}` : `${chip.textContent}：`;
        textarea.focus();
      });
    });
  }
  const sendBtn = container.querySelector("#ai-send-btn");
  if (sendBtn && textarea) {
    sendBtn.addEventListener("click", async () => {
      const text = textarea.value.trim();
      if (!text) { showToast("依頼内容を入力してください"); return; }
      const request = { id: `local-${Date.now()}`, ai: "Claude", text, status: "待機中" };
      await Repository.addAiRequest(request);
      const listEl = container.querySelector('[data-component="ai-today"] .co-card');
      if (listEl) listEl.insertAdjacentHTML("afterbegin", renderRequestItem(request, false));
      textarea.value = "";
      showToast("依頼を送信しました(Sprint3でAI連携予定)");
    });
  }
  const micBtn = container.querySelector("#ai-mic-btn");
  if (micBtn) micBtn.addEventListener("click", () => showToast("音声メモはSprint3以降で対応予定です"));
}

async function renderAiScreen() {

    <section class="co-section" data-component="ai-agents">
      <div class="co-agent-grid">${data.agents.map(renderAgentCard).join("")}</div>
    </section>
    <section class="co-section" data-component="ai-composer">

function buildKpiListModal(kpiList) {
  const axisOrder = ["開発", "発信", "収益化"];

  const groups = axisOrder.map(axis => {
    const items = kpiList.filter(k => k.axis === axis);
    if (!items.length) return "";
    const rows = items.map(k => `
      <div class="co-modal-list-item" style="align-items:center;">
        <span style="flex:1;">
          <b style="display:block; font-size:14px; font-weight:800;">${k.title}</b>
          <span class="tabular-num" style="font-size:18px; font-weight:900;">${formatNumber(k.value)}</span>

        </span>
        <span style="width:90px;">${buildSparkline(k.history, axisColor[axis])}</span>
      </div>`).join("");
    return `
      <div class="co-modal-section">
        <p class="co-modal-section__label" style="color:${axisColor[axis]};">${axis}</p>

  const itemsHtml = investment.items.length

  const messagesHtml = investment.messages.map(m => `<p class="co-invest-message">${m}</p>`).join("");

  return `

      <p class="co-invest-gauge__label">投資回収ゲージ ${investment.recoveryPct}%</p>

    <div class="co-modal-section">
      ${messagesHtml}

    <div class="co-modal-section">
      <p class="co-modal-section__label">投資項目(累計 ${investment.months}ヶ月)</p>

}

/** 円表示ヘルパー(クライアント側)。GAS側のformatYen_と表記を揃える。 */

  return "¥" + formatNumber(Math.round(n));
}

function bindMenuEvents(container, data) {
  container.querySelectorAll("[data-menu-key]").forEach(row => {
    row.addEventListener("click", () => {
      const key = row.dataset.menuKey;
      if (key === "kpi") {
        openModal(buildKpiListModal(data.kpi));
        return;
      }
      if (key === "revenue") {
        openModal(buildRevenueModal(data.revenue));
        const totalEl = document.getElementById("revenue-total");
        if (totalEl) animateCountUp(totalEl, data.revenue.total);
        return;
      }
      if (key === "level") {
        openModal(buildLevelDetailModal(data.player));
        return;
      }
      if (key === "phase") {
        openModal(buildPhaseDetailModal(data.phase));
        return;
      }
      if (key === "investment") {
        openModal(buildInvestmentModal(data.investment));
        requestAnimationFrame(() => {
          document.querySelectorAll(".co-modal-sheet [data-progress-to]").forEach(el => {
            el.style.width = `${el.dataset.progressTo}%`;
          });
        });
        return;
      }
      if (key === "badges") {
        openModal(buildBadgesModal(data.badges));
        return;
      }
      if (key === "content_stock") {
        openContentStockList();
        return;
      }
      if (key === "ai_research") {
        openResearchCandidatesList();
        return;
      }
      showToast("この項目はSprint5以降で実装予定です");
    });
  });
  const profileEl = container.querySelector("[data-menu-profile]");
  if (profileEl) profileEl.addEventListener("click", () => openModal(buildProfileModal(data.profile)));
}

/* ============================================================
   4f. 【Sprint14】Content Stock コンポーネント
   ------------------------------------------------------------
   「1ネタ=1レコード」がX/note/TikTok/画像/動画すべての起点になる設計。
   今回(①+③)はストック本体の作成・一覧・ステータス/優先度の簡易編集まで。
   生成導線(X/note/TikTok12シーン等への遷移)は次回Sprintで追加する。
   ============================================================ */
const CONTENT_STATUS_LABELS = {
  idea: "アイデア", draft: "下書き", review: "レビュー中", approved: "承認済み", posted: "投稿済み"
};
const CONTENT_STATUS_ORDER = ["idea", "draft", "review", "approved", "posted"];
const CONTENT_PRIORITY_LABELS = { high: "優先度:高", normal: "優先度:中", low: "優先度:低" };
const CONTENT_PRIORITY_ORDER = ["high", "normal", "low"];

/**
 * 【Sprint16①】ネタの目的(purpose)
 * follower:フォロワー獲得 / engagement:保存・コメント狙い / note:note誘導
 * paid:有料記事 / product:商品・システム紹介 / branding:ブランディング
 */
const CONTENT_PURPOSE_LABELS = {
  follower: "🎯フォロワー獲得",
  engagement: "💬保存・コメント",
  note: "📝note誘導",
  paid: "💰有料記事",
  product: "🛠商品紹介",
  branding: "🏷ブランディング"
};
const CONTENT_PURPOSE_ORDER = ["follower", "engagement", "note", "paid", "product", "branding"];

function contentStatusOptions_(selected) {
  return CONTENT_STATUS_ORDER.map(s => `<option value="${s}" ${s === selected ? "selected" : ""}>${CONTENT_STATUS_LABELS[s]}</option>`).join("");
}
function contentPriorityOptions_(selected) {
  return CONTENT_PRIORITY_ORDER.map(p => `<option value="${p}" ${p === selected ? "selected" : ""}>${CONTENT_PRIORITY_LABELS[p]}</option>`).join("");
}
function contentPurposeOptions_(selected) {
  const blank = `<option value="" ${!selected ? "selected" : ""}>未設定</option>`;
  return blank + CONTENT_PURPOSE_ORDER.map(p => `<option value="${p}" ${p === selected ? "selected" : ""}>${CONTENT_PURPOSE_LABELS[p]}</option>`).join("");
}

function renderContentStockItem_(item) {
  const metaBits = [item.contentType, item.targetAudience, item.category].filter(Boolean).join(" ・ ");
  const purposeLabel = CONTENT_PURPOSE_LABELS[item.purpose] || "";
  return `
    <div class="co-cs-item" data-cs-id="${item.id}">
      <div class="co-cs-item__top">
        <p class="co-cs-item__title">${item.title || "(無題)"}</p>
        <span class="co-status-badge" data-status="${item.status}">${CONTENT_STATUS_LABELS[item.status] || item.status}</span>
      </div>
      ${metaBits ? `<p class="co-cs-item__meta">${metaBits}</p>` : ""}
      ${purposeLabel ? `<p class="co-cs-item__meta">${purposeLabel}</p>` : ""}
      ${item.idea ? `<p class="co-cs-item__idea">${item.idea}</p>` : ""}
      <div class="co-cs-item__controls">
        <select class="co-cs-select" data-cs-field="status" data-cs-id="${item.id}">${contentStatusOptions_(item.status)}</select>
        <select class="co-cs-select" data-cs-field="priority" data-cs-id="${item.id}">${contentPriorityOptions_(item.priority || "normal")}</select>
      </div>
      <button class="co-cs-detail-link" data-action="cs-open-detail" data-cs-id="${item.id}">
        生成コンテンツを編集(X・note・TikTok)${icon("chevronRight")}
      </button>
    </div>`;
}

function buildContentStockListModal_(items) {
  const body = items.length
    ? items.map(renderContentStockItem_).join("")

/**
 * 採用/保留/却下ボタンの共通ハンドラ。HOME側のカードとAIリサーチ
 * 一覧Modalの両方から呼ばれるため、対象コンテナとハンドル後の
 * 挙動(onHandled)を引数で受け取る汎用実装にしている。
 */
function bindResearchCandidateActions_(container, opts) {
  if (!container) return;
  const onHandled = (opts && opts.onHandled) || (() => {});

  container.querySelectorAll("[data-rc-action]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.rcId;
      const action = btn.dataset.rcAction;
      const row = container.querySelector(`[data-rc-id="${id}"]`);
      const buttons = row ? row.querySelectorAll("[data-rc-action]") : [btn];
      buttons.forEach(b => b.disabled = true);

      try {
        if (action === "approve") {
          await Repository.approveResearchCandidate({ id });
          showToast("採用しました。コンテンツストックに追加されました");
        } else if (action === "hold") {
          await Repository.updateResearchCandidateStatus({ id, status: "hold" });
          showToast("保留にしました");
        } else if (action === "reject") {
          await Repository.updateResearchCandidateStatus({ id, status: "rejected" });
          showToast("却下しました");
        }
        if (row) row.remove();
        onHandled();
      } catch (e) {
        showToast("処理に失敗しました");
        buttons.forEach(b => b.disabled = false);
      }
    });
  });
}

  bindMissionEvents(contentEl.querySelector('[data-component="mission-card"]'), data);
  bindQuickActionEvents(contentEl.querySelector('[data-component="quick-actions"]'));
  bindKpiEvents(contentEl.querySelector('[data-component="kpi-card"]'));

  contentEl.querySelectorAll("[data-count-to]").forEach(el => {
    animateCountUp(el, Number(el.dataset.countTo));
  });
  requestAnimationFrame(() => {
    contentEl.querySelectorAll("[data-progress-to]").forEach(el => {
      el.style.width = `${el.dataset.progressTo}%`;
    });
  });

  if (data.yesterdaySummary) {
    const shownKey = "ceoOS_v2_yesterday_summary_shown";
    const today = todayISO();
    if (sessionStorage.getItem(shownKey) !== today) {
      const { doneCount, total } = data.yesterdaySummary;
      setTimeout(() => showToast(`昨日は${doneCount}/${total}ミッション達成でした`), 500);
      sessionStorage.setItem(shownKey, today);
    }
  }
}

/* ============================================================
   6. BOTTOM NAVIGATION / 画面切り替え
   ============================================================ */
const NAV_ITEMS = [
  { key: "home",     label: "HOME",     icon: "home" },
  { key: "ai",       label: "AI",       icon: "ai" },
  { key: "projects", label: "Projects", icon: "projects" },
  { key: "sns",      label: "SNS",      icon: "sns" },
  { key: "menu",     label: "Menu",     icon: "menu" }
];

const SCREEN_RENDERERS = {
  ai: renderAiScreen,
  projects: renderProjectsScreen,
  sns: renderSnsScreen,
  menu: renderMenuScreen
};

function renderBottomNav() {
  const nav = document.getElementById("bottom-nav");
  nav.innerHTML = NAV_ITEMS.map(item => `
    <button class="co-navitem ${item.key === "home" ? "is-active" : ""}" data-nav="${item.key}">
      ${icon(item.icon)}
      <span>${item.label}</span>
    </button>`).join("");

  nav.querySelectorAll(".co-navitem").forEach(btn => {
    btn.addEventListener("click", () => switchScreen(btn.dataset.nav));
  });
}

function switchScreen(key) {
  document.querySelectorAll(".co-navitem").forEach(b => b.classList.toggle("is-active", b.dataset.nav === key));
  document.querySelectorAll(".co-screen").forEach(s => s.classList.toggle("is-active", s.dataset.screen === key));

  if (key !== "home") {
    const target = document.getElementById(`screen-${key}`);
    if (!target.dataset.rendered) {
      target.dataset.rendered = "1";
      SCREEN_RENDERERS[key]();
    }
  }
  window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
}

/* ============================================================
   7. INIT
   ============================================================ */
document.addEventListener("DOMContentLoaded", () => {
  renderBottomNav();
  renderHomeScreen();

  const modalBackdrop = document.getElementById("modal-backdrop");
  modalBackdrop.addEventListener("click", (e) => {
    if (e.target === modalBackdrop) closeModal();
  });
});
</script>
